<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a1a">
<title>鬼抓人大作战</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#080816;color:#fff;touch-action:none;user-select:none;-webkit-user-select:none}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.screen.active{display:flex}

/* Lobby */
#lobby{background:#080816;overflow:hidden}
#lobby-bg{position:absolute;inset:0;z-index:0}
#lobby>*:not(#lobby-bg){position:relative;z-index:1}
.lobby-ornament{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:floatOrb 12s ease-in-out infinite alternate}
@keyframes floatOrb{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-40px) scale(1.15)}100%{transform:translate(-20px,30px) scale(.9)}}
.logo{font-size:clamp(38px,9vw,60px);font-weight:900;background:linear-gradient(135deg,#ff6b6b,#ffd93d 35%,#6bcb77 65%,#4d96ff);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradShift 6s ease infinite;margin-bottom:4px;letter-spacing:2px}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.subtitle{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:32px;letter-spacing:4px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:28px 24px;width:min(380px,88vw);margin-bottom:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);transition:transform .3s,box-shadow .3s}
.card h3{font-size:14px;margin-bottom:16px;color:rgba(255,255,255,.5);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.input-row{display:flex;gap:10px;margin-bottom:14px}
input[type=text]{flex:1;padding:14px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#fff;font-size:16px;outline:none;text-align:center;letter-spacing:3px;text-transform:uppercase;transition:border-color .3s,box-shadow .3s}
input[type=text]::placeholder{color:rgba(255,255,255,.2);letter-spacing:1px;text-transform:none}
input[type=text]:focus{border-color:#4d96ff;box-shadow:0 0 0 3px rgba(77,150,255,.15)}
.btn{padding:14px 24px;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);width:100%;position:relative;overflow:hidden;letter-spacing:.5px}
.btn:active{transform:scale(.96)}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.13) 50%,transparent 60%);transform:translateX(-100%);transition:transform .6s}
.btn:hover::after{transform:translateX(100%)}
.btn-primary{background:linear-gradient(135deg,#4d96ff,#6bcb77);color:#fff;box-shadow:0 4px 15px rgba(77,150,255,.25)}
.btn-secondary{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;box-shadow:0 4px 15px rgba(255,107,107,.25)}
.btn-gold{background:linear-gradient(135deg,#ffd93d,#ff9f43);color:#1a1a2e;box-shadow:0 4px 15px rgba(255,217,61,.25)}
.btn+.btn{margin-top:10px}
.room-code{font-size:clamp(34px,9vw,52px);font-weight:900;letter-spacing:10px;color:#ffd93d;text-align:center;padding:12px 0;font-family:monospace;text-shadow:0 0 20px rgba(255,217,61,.3)}
.status-text{text-align:center;color:rgba(255,255,255,.45);font-size:13px;margin-top:8px}
.players-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
.player-tag{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);transition:all .3s}
.player-tag.host{border-color:rgba(255,217,61,.4);color:#ffd93d;background:rgba(255,217,61,.08)}

/* Game Screen */
#game-screen{background:#080816}
#game-hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(8,8,22,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:20;border-bottom:1px solid rgba(255,255,255,.05)}
.hud-item{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.hud-timer{font-size:24px;font-weight:900;color:#ffd93d;font-family:monospace;min-width:60px;text-align:center}
.hud-timer.urgent{color:#ff6b6b;animation:pulse .5s infinite alternate}
@keyframes pulse{from{opacity:1;transform:scale(1)}to{opacity:.6;transform:scale(1.05)}}
.hud-role{padding:5px 14px;border-radius:12px;font-size:12px;font-weight:700;letter-spacing:.5px}
.hud-role.ghost{background:rgba(255,107,107,.15);color:#ff6b6b;border:1px solid rgba(255,107,107,.25);box-shadow:0 0 12px rgba(255,107,107,.1)}
.hud-role.runner{background:rgba(77,150,255,.15);color:#4d96ff;border:1px solid rgba(77,150,255,.25);box-shadow:0 0 12px rgba(77,150,255,.1)}
#game-canvas{display:block;width:100%;height:100%}

/* Minimap */
#minimap{position:fixed;bottom:16px;right:16px;width:120px;height:90px;background:rgba(8,8,22,.8);border:1px solid rgba(255,255,255,.1);border-radius:10px;z-index:25;overflow:hidden;backdrop-filter:blur(6px)}

/* Joystick */
#joystick-zone{position:fixed;bottom:20px;left:20px;width:140px;height:140px;z-index:30}
#joystick-base{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:inset 0 0 20px rgba(0,0,0,.3)}
#joystick-knob{width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.25),rgba(255,255,255,.08));border:2px solid rgba(255,255,255,.2);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:none;box-shadow:0 2px 10px rgba(0,0,0,.3)}

/* Countdown */
#countdown{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(6px)}
#countdown.active{display:flex}
#countdown-text{font-size:clamp(60px,20vw,120px);font-weight:900;color:#ffd93d;animation:countPop .8s ease;text-shadow:0 0 40px rgba(255,217,61,.4)}
@keyframes countPop{0%{transform:scale(2.5);opacity:0}50%{transform:scale(1);opacity:1}100%{transform:scale(.92);opacity:.85}}

/* Result */
#result{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,.8);backdrop-filter:blur(12px)}
#result.active{display:flex}
#result-title{font-size:clamp(32px,8vw,48px);font-weight:900;margin-bottom:8px;animation:resultPop .6s ease}
@keyframes resultPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
#result-sub{font-size:15px;color:rgba(255,255,255,.5);margin-bottom:24px}
.result-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px;width:min(340px,85vw);margin-bottom:20px;backdrop-filter:blur(10px)}
.result-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.result-row:last-child{border:none}
.result-row:first-child{font-size:15px}
.result-rank{font-weight:700}
.result-score{color:#ffd93d;font-weight:700}
</style>
</head>
<body>

<!-- Lobby Screen -->
<div id="lobby" class="screen active">
  <div id="lobby-bg">
    <div class="lobby-ornament" style="width:300px;height:300px;background:#ff6b6b;top:-80px;left:-60px;animation-delay:0s"></div>
    <div class="lobby-ornament" style="width:250px;height:250px;background:#4d96ff;bottom:-60px;right:-40px;animation-delay:-4s"></div>
    <div class="lobby-ornament" style="width:200px;height:200px;background:#6bcb77;top:40%;left:60%;animation-delay:-8s"></div>
    <div class="lobby-ornament" style="width:180px;height:180px;background:#ffd93d;top:70%;left:20%;animation-delay:-2s"></div>
  </div>
  <div class="logo">鬼抓人大作战</div>
  <div class="subtitle">多人联机 · 谁是最后的幸存者</div>
  <div class="card" id="card-main">
    <h3>你的昵称</h3>
    <div class="input-row">
      <input type="text" id="player-name" placeholder="输入昵称" maxlength="8">
    </div>
    <button class="btn btn-primary" onclick="createRoom()">创建房间</button>
    <button class="btn btn-secondary" onclick="showJoin()">加入房间</button>
    <button class="btn btn-danger" onclick="showRoleSelect()">🎮 单机模式</button>
  </div>
  <div class="card" id="card-role" style="display:none">
    <h3>选择你的角色</h3>
    <div class="status-text" style="margin-bottom:16px">单机模式: 1鬼 vs 4人 · 5分钟限时</div>
    <button class="btn btn-danger" onclick="startSinglePlayer('ghost')">👻 我要当鬼<br><span style="font-size:11px;opacity:.7">独自追捕4个人类</span></button>
    <button class="btn btn-primary" onclick="startSinglePlayer('runner')">🏃 我要当人类<br><span style="font-size:11px;opacity:.7">和3个队友躲避鬼的追捕</span></button>
    <button class="btn btn-secondary" onclick="showMain()">返回</button>
  </div>
  <div class="card" id="card-join" style="display:none">
    <h3>输入房间号</h3>
    <div class="input-row">
      <input type="text" id="room-code-input" placeholder="房间号" maxlength="6">
    </div>
    <button class="btn btn-primary" onclick="joinRoom()">加入</button>
    <button class="btn btn-secondary" onclick="showMain()">返回</button>
  </div>
  <div class="card" id="card-waiting" style="display:none">
    <h3>房间号</h3>
    <div class="room-code" id="display-room-code">----</div>
    <div class="status-text" id="waiting-status">等待玩家加入...</div>
    <div class="players-list" id="players-list"></div>
    <button class="btn btn-secondary" onclick="showInviteCard()">📤 邀请好友</button>
    <button class="btn btn-gold" id="btn-start" style="display:none" onclick="startGame()">开始游戏</button>
    <button class="btn btn-secondary" onclick="leaveRoom()">离开房间</button>
  </div>
  <div class="card" id="card-invite" style="display:none">
    <h3>邀请好友加入</h3>
    <div class="status-text" style="margin-bottom:12px">把链接发给朋友，点击即可加入</div>
    <div id="invite-link-display" style="word-break:break-all;padding:10px 12px;background:rgba(255,255,255,.06);border-radius:10px;font-size:12px;color:#4d96ff;margin-bottom:14px;line-height:1.6;text-align:center;font-family:monospace"></div>
    <button class="btn btn-gold" onclick="copyInviteLink()">📋 复制链接</button>
    <button class="btn btn-primary" id="btn-native-share" onclick="nativeShare()" style="display:none">📤 分享给好友</button>
    <button class="btn btn-secondary" onclick="hideInviteCard()">返回</button>
  </div>
  <div class="card" id="card-autojoin" style="display:none">
    <h3>有人邀请你玩鬼抓人!</h3>
    <div class="room-code" id="autojoin-room">----</div>
    <div class="input-row">
      <input type="text" id="autojoin-name" placeholder="输入昵称" maxlength="8">
    </div>
    <div class="status-text" id="autojoin-status" style="margin-bottom:10px"></div>
    <button class="btn btn-primary" id="btn-autojoin-go" onclick="doAutoJoin()">加入房间</button>
    <button class="btn btn-secondary" onclick="cancelAutoJoin()">取消</button>
  </div>
</div>

<!-- Game Screen -->
<div id="game-screen" class="screen">
  <div id="game-hud">
    <div class="hud-item"><span id="hud-role" class="hud-role runner">人类</span></div>
    <div class="hud-item"><span class="hud-timer" id="hud-timer">90</span></div>
    <div class="hud-item" id="hud-players">👻 0 | 🏃 0</div>
  </div>
  <canvas id="game-canvas"></canvas>
  <div id="joystick-zone">
    <div id="joystick-base"></div>
    <div id="joystick-knob"></div>
  </div>
  <canvas id="minimap"></canvas>
</div>

<!-- Countdown -->
<div id="countdown"><div id="countdown-text"></div></div>

<!-- Result -->
<div id="result">
  <div id="result-title"></div>
  <div id="result-sub"></div>
  <div class="result-card" id="result-scores"></div>
  <button class="btn btn-primary" onclick="playAgain()" style="width:min(280px,70vw)">再来一局</button>
  <button class="btn btn-secondary" onclick="backToLobby()" style="width:min(280px,70vw)">返回大厅</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ============ CONFIG ============
const ARENA_W = 1000, ARENA_H = 700;
const PLAYER_R = 14;
const PLAYER_SPEED = 2.8;
const GHOST_SPEED = 3.1;
const TAG_DIST = PLAYER_R * 2.2;
const ROUND_TIME = 90;
const TICK_RATE = 50; // ms per tick
const PEER_CONFIG = {
  config: {
    iceServers: [
      {urls: 'stun:stun.l.google.com:19302'},
      {urls: 'stun:stun1.l.google.com:19302'},
      {urls: 'stun:stun2.l.google.com:19302'},
      {urls: 'stun:stun.cloudflare.com:3478'}
    ]
  }
};
const CONNECT_TIMEOUT = 15000; // 15s timeout

// Show connection status in the waiting area
function showConnStatus(msg, isError) {
  const el = document.getElementById('waiting-status');
  el.textContent = msg;
  el.style.color = isError ? '#ff6b6b' : 'rgba(255,255,255,.5)';
}

const COLORS = ['#4d96ff','#6bcb77','#ffd93d','#ff6b6b','#a66cff','#ff9f43','#00d2d3','#ee5a24','#c44dff','#2ecc71'];
const NAMES_DEFAULT = ['小明','小红','小蓝','小绿','小黄','小紫','小橙','小粉','小灰','小白'];

// ============ WORDS (not needed for tag game, using arena obstacles instead) ============

// ============ GAME STATE ============
let peer = null;
let isHost = false;
let myId = '';
let myName = '';
let myColor = 0;
let roomCode = '';
let connections = []; // host: all peer connections
let players = {}; // id -> {id, name, color, x, y, isGhost, dir, score, alive}
let gameTime = ROUND_TIME;
let gameRunning = false;
let gameTimerInterval = null;
let tickInterval = null;
let myDir = {x:0, y:0};

// Canvas
let canvas, ctx;
let canvasScale = 1;
let canvasOffX = 0, canvasOffY = 0;

// Joystick
let joystickActive = false;
let joystickCenter = {x:0, y:0};

// Walls/obstacles - Complex map with 4 corner rooms, corridors, central structure
const WALLS = [
  // === TOP-LEFT ROOM (shelter with entrance on right/bottom) ===
  {x:60,y:60,w:130,h:16},
  {x:60,y:60,w:16,h:110},
  {x:60,y:154,w:90,h:16},

  // === TOP-RIGHT ROOM (shelter with entrance on left/bottom) ===
  {x:810,y:60,w:130,h:16},
  {x:924,y:60,w:16,h:110},
  {x:850,y:154,w:90,h:16},

  // === BOTTOM-LEFT ROOM (shelter with entrance on right/top) ===
  {x:60,y:530,w:130,h:16},
  {x:60,y:436,w:16,h:110},
  {x:60,y:436,w:90,h:16},

  // === BOTTOM-RIGHT ROOM (shelter with entrance on left/top) ===
  {x:810,y:530,w:130,h:16},
  {x:924,y:436,w:16,h:110},
  {x:850,y:436,w:90,h:16},

  // === CENTRAL DIAMOND STRUCTURE ===
  {x:460,y:290,w:80,h:16},
  {x:460,y:394,w:80,h:16},
  {x:440,y:306,w:16,h:88},
  {x:544,y:306,w:16,h:88},

  // === TOP/BOTTOM HORIZONTAL BARRIERS (create corridors) ===
  {x:320,y:180,w:100,h:16},
  {x:580,y:180,w:100,h:16},
  {x:320,y:504,w:100,h:16},
  {x:580,y:504,w:100,h:16},

  // === CORRIDOR PILLARS (create cover while crossing) ===
  {x:270,y:330,w:28,h:28},
  {x:702,y:330,w:28,h:28},

  // === SCATTERED BOULDERS (extra cover) ===
  {x:195,y:280,w:35,h:16},
  {x:770,y:390,w:35,h:16},
  {x:490,y:100,w:20,h:20},
  {x:490,y:580,w:20,h:20},
];

// ============ SCREENS ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
let shareUrl = '';

function hideAllCards() {
  ['card-main','card-join','card-waiting','card-invite','card-autojoin','card-role'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}
function showMain() {
  hideAllCards();
  document.getElementById('card-main').style.display = '';
}
function showJoin() {
  hideAllCards();
  document.getElementById('card-join').style.display = '';
}
function showWaiting() {
  hideAllCards();
  document.getElementById('card-waiting').style.display = '';
}
function showInviteCard() {
  hideAllCards();
  document.getElementById('card-invite').style.display = '';
}
function hideInviteCard() {
  hideAllCards();
  document.getElementById('card-waiting').style.display = '';
}

// ============ ROOM CODE ============
function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// ============ CREATE ROOM ============
function createRoom() {
  myName = document.getElementById('player-name').value.trim() || NAMES_DEFAULT[Math.floor(Math.random() * NAMES_DEFAULT.length)];
  roomCode = genRoomCode();
  isHost = true;
  myColor = 0;

  // Show waiting screen immediately with status
  document.getElementById('display-room-code').textContent = '...';
  showWaiting();
  showConnStatus('正在连接服务器...', false);

  const peerId = 'ghosttag-' + roomCode;
  peer = new Peer(peerId, PEER_CONFIG);

  // Timeout for initial connection
  const connTimeout = setTimeout(() => {
    if (!myId) {
      showConnStatus('连接超时，请检查网络后重试', true);
      if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
      setTimeout(() => { showScreen('lobby'); showMain(); }, 2500);
    }
  }, CONNECT_TIMEOUT);

  peer.on('open', id => {
    clearTimeout(connTimeout);
    myId = id;
    players[myId] = {id:myId, name:myName, color:myColor, x:ARENA_W/2, y:ARENA_H/2, isGhost:false, dir:{x:0,y:0}, score:0, alive:true};
    document.getElementById('display-room-code').textContent = roomCode;
    document.getElementById('btn-start').style.display = '';
    updatePlayersList();

    // Generate invite link and show invite card
    shareUrl = location.origin + location.pathname + '?room=' + roomCode;
    document.getElementById('invite-link-display').textContent = shareUrl;
    // Show native share button if available (mobile)
    document.getElementById('btn-native-share').style.display = navigator.share ? '' : 'none';
    showInviteCard();
  });

  peer.on('connection', conn => {
    conn.on('open', () => {
      connections.push(conn);
      conn.on('data', data => handleHostMessage(conn, data));
      conn.on('close', () => {
        connections = connections.filter(c => c !== conn);
        const pid = conn.metadata?.peerId;
        if (pid && players[pid]) {
          delete players[pid];
          broadcast({type:'player_leave', id:pid});
          updatePlayersList();
        }
      });
    });
  });

  peer.on('error', err => {
    clearTimeout(connTimeout);
    if (err.type === 'unavailable-id') {
      roomCode = genRoomCode();
      peer.destroy();
      createRoom(); // retry with new code
    } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error') {
      showConnStatus('网络连接失败，请检查网络设置', true);
      setTimeout(() => { showScreen('lobby'); showMain(); }, 2500);
    } else if (err.type === 'peer-unavailable') {
      showConnStatus('房间不存在或已关闭', true);
      setTimeout(() => { showScreen('lobby'); showMain(); }, 2500);
    } else {
      showConnStatus('连接错误: ' + err.type, true);
      setTimeout(() => { showScreen('lobby'); showMain(); }, 3000);
    }
  });
}

// ============ JOIN ROOM ============
function joinRoom() {
  myName = document.getElementById('player-name').value.trim() || NAMES_DEFAULT[Math.floor(Math.random() * NAMES_DEFAULT.length)];
  roomCode = document.getElementById('room-code-input').value.trim().toUpperCase();
  if (!roomCode || roomCode.length < 3) { alert('请输入房间号'); return; }
  isHost = false;

  // Show waiting screen with status
  document.getElementById('display-room-code').textContent = roomCode;
  document.getElementById('btn-start').style.display = 'none';
  showWaiting();
  showConnStatus('正在连接服务器...', false);

  const peerId = 'ghosttag-join-' + Date.now();
  peer = new Peer(peerId, PEER_CONFIG);

  let attemptCount = 0;
  const MAX_ATTEMPTS = 2;

  function tryConnect() {
    attemptCount++;
    showConnStatus(`正在连接房间${roomCode}... (${attemptCount}/${MAX_ATTEMPTS + 1})`, false);

    const hostId = 'ghosttag-' + roomCode;
    const conn = peer.connect(hostId, {metadata:{name:myName}, reliable:true});
    connections = [conn];

    // Timeout for this connection attempt
    const attemptTimeout = setTimeout(() => {
      if (!conn.open) {
        try { conn.close(); } catch(e){}
        if (attemptCount <= MAX_ATTEMPTS) {
          tryConnect(); // retry
        } else {
          showConnStatus('连接超时，请确认房间号正确且网络正常', true);
          setTimeout(() => { showScreen('lobby'); showMain(); }, 2500);
        }
      }
    }, CONNECT_TIMEOUT);

    conn.on('open', () => {
      clearTimeout(attemptTimeout);
      conn.send({type:'join', name:myName});
      showConnStatus('已连接，等待房主开始...', false);
    });

    conn.on('data', data => handleClientMessage(data));

    conn.on('close', () => {
      showConnStatus('与房间断开连接', true);
      setTimeout(() => {
        showScreen('lobby');
        showMain();
      }, 2000);
    });

    conn.on('error', err => {
      clearTimeout(attemptTimeout);
      if (attemptCount <= MAX_ATTEMPTS) {
        tryConnect(); // retry
      } else {
        showConnStatus('连接失败，请重试', true);
        setTimeout(() => { showScreen('lobby'); showMain(); }, 2500);
      }
    });
  }

  peer.on('open', id => {
    myId = id;
    tryConnect();
  });

  peer.on('error', err => {
    if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error') {
      showConnStatus('无法连接信令服务器，请检查网络', true);
    } else if (err.type === 'peer-unavailable') {
      showConnStatus('房间不存在或房主已离开', true);
    } else {
      showConnStatus('连接错误: ' + err.type, true);
    }
    setTimeout(() => { showScreen('lobby'); showMain(); }, 2500);
  });
}

// ============ SINGLE PLAYER MODE ============
const SP_TIME = 300; // 5 minutes
const BOT_NAMES = ['小灰','小白','小黑','小黄','小粉','小橙','小紫','小绿'];
const AI_WANDER_CHANGE = 3000; // ms between random direction changes
const AI_DETECT_GHOST = 220; // px distance to start fleeing
const AI_RAY_LENGTH = 80; // ray-cast distance for wall look-ahead
const AI_STUCK_TIME = 1200; // ms before stuck detection kicks in
const AI_CORNER_PENALTY = 60; // distance threshold for corner detection

let isSinglePlayer = false;
let spRole = ''; // 'ghost' or 'runner'
let bots = []; // AI bot objects
let spTickInterval = null;
let spTimerInterval = null;

function showRoleSelect() {
  hideAllCards();
  document.getElementById('card-role').style.display = '';
}

function startSinglePlayer(role) {
  isSinglePlayer = true;
  spRole = role;
  isHost = true; // we run the game logic locally
  myName = document.getElementById('player-name').value.trim() || NAMES_DEFAULT[Math.floor(Math.random() * NAMES_DEFAULT.length)];
  myColor = role === 'ghost' ? 0 : 1;
  roomCode = 'SINGLE';

  // Create players
  players = {};
  bots = [];
  const spawnPositions = [
    {x:500,y:350},{x:120,y:110},{x:870,y:110},{x:120,y:580},{x:870,y:580}
  ];

  // Player
  const myPlayerId = 'player-self';
  const playerIsGhost = (role === 'ghost');
  players[myPlayerId] = {
    id: myPlayerId, name: myName, color: myColor,
    x: spawnPositions[0].x, y: spawnPositions[0].y,
    isGhost: playerIsGhost, dir: {x:0,y:0}, score: 0, alive: true
  };
  myId = myPlayerId;

  // Create 4 bots
  const botNames = shuffleCopy(BOT_NAMES).slice(0, 4);
  for (let i = 0; i < 4; i++) {
    const botId = 'bot-' + i;
    // Ghost mode: player=ghost, all 4 bots=runners (opponents)
    // Runner mode: 1 bot=ghost (opponent), 3 bots=runners (teammates)
    const botIsGhost = (role === 'runner' && i === 0);
    const botColor = (i + 2) % COLORS.length;
    const pos = spawnPositions[i + 1] || {x: 200 + Math.random()*400, y: 200 + Math.random()*200};
    players[botId] = {
      id: botId, name: botNames[i], color: botColor,
      x: pos.x, y: pos.y,
      isGhost: botIsGhost, dir: {x:0,y:0}, score: 0, alive: true
    };
    bots.push({
      id: botId,
      dir: {x:0, y:0},
      wanderTimer: Math.random() * 2000,
      targetX: pos.x,
      targetY: pos.y,
      stuckTimer: 0,
      lastX: pos.x,
      lastY: pos.y,
      isStuck: false
    });
  }

  gameTime = SP_TIME;
  connections = [];
  gameRunning = true;

  // Start game
  showScreen('game-screen');
  initCanvas();
  showCountdown(3, () => {
    spTickInterval = setInterval(singlePlayerTick, TICK_RATE);
    spTimerInterval = setInterval(() => {
      gameTime--;
      if (gameTime <= 0) {
        gameTime = 0;
        finishSinglePlayer();
      }
    }, 1000);
    updateHUD();
    requestAnimationFrame(gameLoop);
  });
}

function shuffleCopy(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============ SINGLE PLAYER TICK ============
function singlePlayerTick() {
  const ids = Object.keys(players);

  // Update AI bots
  updateBots();

  // Move all players (same as hostTick)
  ids.forEach(id => {
    const p = players[id];
    if (!p.alive) return;
    const speed = p.isGhost ? GHOST_SPEED : PLAYER_SPEED;
    let nx = p.x + p.dir.x * speed;
    let ny = p.y + p.dir.y * speed;
    if (!collidesWall(nx, p.y, PLAYER_R)) p.x = nx;
    if (!collidesWall(p.x, ny, PLAYER_R)) p.y = ny;
    p.x = Math.max(PLAYER_R, Math.min(ARENA_W - PLAYER_R, p.x));
    p.y = Math.max(PLAYER_R, Math.min(ARENA_H - PLAYER_R, p.y));
  });

  // Tag detection
  const ghosts = ids.filter(id => players[id].isGhost && players[id].alive);
  const runners = ids.filter(id => !players[id].isGhost && players[id].alive);
  ghosts.forEach(gid => {
    runners.forEach(rid => {
      const g = players[gid], r = players[rid];
      if (Math.hypot(g.x - r.x, g.y - r.y) < TAG_DIST) {
        r.isGhost = true;
        g.score += 10;
      }
    });
  });

  // Check game end
  const currentRunners = ids.filter(id => !players[id].isGhost && players[id].alive);
  if (currentRunners.length === 0) {
    finishSinglePlayer();
  }

  updateHUD();
}

// ============ AI BOT LOGIC (v2 - improved) ============
function updateBots() {
  const ids = Object.keys(players);
  const allGhosts = ids.filter(id => players[id].isGhost && players[id].alive);
  const allRunners = ids.filter(id => !players[id].isGhost && players[id].alive);

  bots.forEach(bot => {
    const p = players[bot.id];
    if (!p || !p.alive) return;

    const moved = Math.hypot(p.x - bot.lastX, p.y - bot.lastY);
    if (moved < 0.5) {
      bot.stuckTimer += TICK_RATE;
    } else {
      bot.stuckTimer = 0;
      bot.isStuck = false;
    }
    bot.lastX = p.x;
    bot.lastY = p.y;
    if (bot.stuckTimer > AI_STUCK_TIME) bot.isStuck = true;

    if (p.isGhost) {
      updateGhostBot(bot, p, allRunners);
    } else {
      updateRunnerBot(bot, p, allGhosts);
    }

    p.dir = {...bot.dir};
  });
}

// ---- Ray-cast helpers ----
function rayHitsWall(x, y, dx, dy, maxDist) {
  const step = 5;
  const steps = Math.ceil(maxDist / step);
  for (let i = 1; i <= steps; i++) {
    const t = (i / steps) * maxDist;
    if (pointInWall(x + dx * t, y + dy * t)) return t;
  }
  return maxDist;
}

function pointInWall(px, py) {
  for (const w of WALLS) {
    if (px >= w.x - 2 && px <= w.x + w.w + 2 && py >= w.y - 2 && py <= w.y + w.h + 2) return true;
  }
  return false;
}

function rayDir(x, y, angle, maxDist) {
  return rayHitsWall(x, y, Math.cos(angle), Math.sin(angle), maxDist);
}

function bestPerpDir(x, y, baseAngle) {
  const leftAngle = baseAngle + Math.PI / 2;
  const rightAngle = baseAngle - Math.PI / 2;
  const leftDist = rayDir(x, y, leftAngle, AI_RAY_LENGTH);
  const rightDist = rayDir(x, y, rightAngle, AI_RAY_LENGTH);
  if (leftDist > rightDist) return {x: Math.cos(leftAngle), y: Math.sin(leftAngle)};
  return {x: Math.cos(rightAngle), y: Math.sin(rightAngle)};
}

function opennessScore(x, y) {
  let minDist = Infinity;
  for (const w of WALLS) {
    const cx = Math.max(w.x, Math.min(x, w.x + w.w));
    const cy = Math.max(w.y, Math.min(y, w.y + w.h));
    minDist = Math.min(minDist, Math.hypot(x - cx, y - cy));
  }
  minDist = Math.min(minDist, x, y, ARENA_W - x, ARENA_H - y);
  return minDist;
}

// Check if path between two points is clear of walls
function isPathClear(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.hypot(dx, dy);
  if (dist < 5) return true;
  const steps = Math.ceil(dist / 12);
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    if (pointInWall(x1 + dx * t, y1 + dy * t)) return false;
  }
  return true;
}

// Find the safest direction to flee, evaluating multiple candidate directions
function findSafestFleeDir(x, y, ghostDists) {
  let bestAngle = 0, bestScore = -Infinity;
  for (let a = 0; a < Math.PI * 2; a += Math.PI / 12) {
    const rayDist = rayDir(x, y, a, 120);
    if (rayDist < 18) continue; // skip directions blocked by nearby wall

    // Score destination point at 80px in this direction
    const destX = x + Math.cos(a) * 80;
    const destY = y + Math.sin(a) * 80;
    let score = opennessScore(destX, destY) * 2;
    score += Math.min(rayDist, 100);

    // Bonus: path to destination is clear
    if (isPathClear(x, y, destX, destY)) score += 60;

    // Bonus: farther from all ghosts
    ghostDists.forEach(g => {
      const gd = Math.hypot(destX - g.x, destY - g.y);
      score += Math.min(gd, 250) * 0.4;
    });

    if (score > bestScore) { bestScore = score; bestAngle = a; }
  }
  return {x: Math.cos(bestAngle), y: Math.sin(bestAngle)};
}

// ---- Ghost AI ----
function updateGhostBot(bot, me, runnerIds) {
  if (runnerIds.length === 0) { bot.dir = {x:0,y:0}; return; }

  let nearest = null, nearDist = Infinity;
  runnerIds.forEach(rid => {
    const r = players[rid];
    if (!r || !r.alive) return;
    const d = Math.hypot(r.x - me.x, r.y - me.y);
    if (d < nearDist) { nearDist = d; nearest = r; }
  });
  if (!nearest) { bot.dir = {x:0,y:0}; return; }

  const dx = nearest.x - me.x;
  const dy = nearest.y - me.y;
  const dist = Math.hypot(dx, dy);
  if (dist < 1) { bot.dir = {x:0,y:0}; return; }

  let desiredX = dx / dist;
  let desiredY = dy / dist;
  const baseAngle = Math.atan2(desiredY, desiredX);

  // Forward ray-cast: wall ahead?
  const fwdDist = rayDir(me.x, me.y, baseAngle, AI_RAY_LENGTH);
  if (fwdDist < 35) {
    const perp = bestPerpDir(me.x, me.y, baseAngle);
    const blend = Math.max(0, 1 - fwdDist / 35);
    desiredX = desiredX * (1 - blend * 0.8) + perp.x * blend * 0.8;
    desiredY = desiredY * (1 - blend * 0.8) + perp.y * blend * 0.8;
  }

  const avoid = wallAvoidance(me.x, me.y, desiredX, desiredY);
  desiredX += avoid.x * 2.0;
  desiredY += avoid.y * 2.0;

  const len = Math.hypot(desiredX, desiredY);
  if (len > 0) { bot.dir = {x: desiredX/len, y: desiredY/len}; }
}

// ---- Runner AI (v2 - major improvements) ----
function updateRunnerBot(bot, me, ghostIds) {
  // Detect ghosts and compute flee vectors
  let fleeX = 0, fleeY = 0, fleeing = false;
  const activeGhosts = [];

  ghostIds.forEach(gid => {
    const g = players[gid];
    if (!g || !g.alive) return;
    const dx = me.x - g.x;
    const dy = me.y - g.y;
    const d = Math.hypot(dx, dy);
    if (d < AI_DETECT_GHOST && d > 0) {
      const strength = (AI_DETECT_GHOST - d) / AI_DETECT_GHOST;
      fleeX += (dx / d) * strength;
      fleeY += (dy / d) * strength;
      fleeing = true;
      activeGhosts.push(g);
    }
  });

  let desiredX, desiredY;

  if (bot.isStuck) {
    // === STUCK ESCAPE: full surround scan to find most open direction ===
    let bestAngle = 0, bestScore = -1;
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 16) {
      const rd = rayDir(me.x, me.y, a, AI_RAY_LENGTH * 1.5);
      const destOpen = opennessScore(
        me.x + Math.cos(a) * 50,
        me.y + Math.sin(a) * 50
      );
      const score = rd * 0.6 + destOpen * 0.4;
      if (score > bestScore) { bestScore = score; bestAngle = a; }
    }
    desiredX = Math.cos(bestAngle);
    desiredY = Math.sin(bestAngle);
    bot.wanderTimer = 0;
    if (bot.stuckTimer > AI_STUCK_TIME * 1.5) {
      bot.stuckTimer = 0;
      bot.isStuck = false;
    }

  } else if (fleeing) {
    // === FLEE MODE ===
    // Check if surrounded on 3+ sides (dead end / corridor trap)
    let blockedSides = 0;
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
      if (rayDir(me.x, me.y, a, 35) < 20) blockedSides++;
    }

    if (blockedSides >= 5) {
      // Deeply trapped - use full safest-direction scan
      const safest = findSafestFleeDir(me.x, me.y, activeGhosts);
      desiredX = safest.x;
      desiredY = safest.y;
    } else if (blockedSides >= 3) {
      // In a corridor or near dead-end - evaluate carefully
      const fleeAngle = Math.atan2(fleeY, fleeX);
      const fwdBlocked = rayDir(me.x, me.y, fleeAngle, 45) < 25;

      if (fwdBlocked) {
        // Can't go forward, use safest direction
        const safest = findSafestFleeDir(me.x, me.y, activeGhosts);
        desiredX = safest.x;
        desiredY = safest.y;
      } else {
        // Can go forward but check sides
        const perp = bestPerpDir(me.x, me.y, fleeAngle);
        desiredX = fleeX; desiredY = fleeY;
        const fl = Math.hypot(desiredX, desiredY);
        if (fl > 0) { desiredX /= fl; desiredY /= fl; }
        desiredX = desiredX * 0.5 + perp.x * 0.5;
        desiredY = desiredY * 0.5 + perp.y * 0.5;
      }
    } else {
      // Open area - normal flee with wall check
      const fleeAngle = Math.atan2(fleeY, fleeX);
      desiredX = Math.cos(fleeAngle);
      desiredY = Math.sin(fleeAngle);

      const fleeRayDist = rayDir(me.x, me.y, fleeAngle, AI_RAY_LENGTH);
      if (fleeRayDist < 30) {
        const perp = bestPerpDir(me.x, me.y, fleeAngle);
        desiredX = perp.x;
        desiredY = perp.y;
      } else if (fleeRayDist < 55) {
        const perp = bestPerpDir(me.x, me.y, fleeAngle);
        const blend = (55 - fleeRayDist) / 25;
        desiredX = desiredX * (1 - blend) + perp.x * blend;
        desiredY = desiredY * (1 - blend) + perp.y * blend;
      }
    }

  } else {
    // === WANDER MODE - pick safe waypoint with path validation ===
    bot.wanderTimer -= TICK_RATE;
    if (bot.wanderTimer <= 0) {
      bot.wanderTimer = AI_WANDER_CHANGE + Math.random() * 2000;
      const wp = pickSafeWaypoint(me.x, me.y, ghostIds);
      bot.targetX = wp.x;
      bot.targetY = wp.y;
    }

    const dx = bot.targetX - me.x;
    const dy = bot.targetY - me.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 15) {
      desiredX = dx / dist;
      desiredY = dy / dist;
    } else {
      bot.wanderTimer = 0;
      desiredX = bot.dir.x || (Math.random() - 0.5);
      desiredY = bot.dir.y || (Math.random() - 0.5);
    }

    // Forward ray-cast while wandering
    const wAngle = Math.atan2(desiredY, desiredX);
    const wFwd = rayDir(me.x, me.y, wAngle, AI_RAY_LENGTH);
    if (wFwd < 30) {
      const perp = bestPerpDir(me.x, me.y, wAngle);
      const blend = Math.max(0, 1 - wFwd / 30);
      desiredX = desiredX * (1 - blend * 0.7) + perp.x * blend * 0.7;
      desiredY = desiredY * (1 - blend * 0.7) + perp.y * blend * 0.7;
    }
  }

  // General wall avoidance
  const avoid = wallAvoidance(me.x, me.y, desiredX, desiredY);
  desiredX += avoid.x * 3.0;
  desiredY += avoid.y * 3.0;

  const len = Math.hypot(desiredX, desiredY);
  if (len > 0) { bot.dir = {x: desiredX/len, y: desiredY/len}; }
}

// Pick a safe waypoint considering openness, path clearance, and ghost distance
function pickSafeWaypoint(curX, curY, ghostIds) {
  let bestX = curX, bestY = curY, bestScore = -Infinity;

  for (let attempt = 0; attempt < 15; attempt++) {
    const tx = 40 + Math.random() * (ARENA_W - 80);
    const ty = 40 + Math.random() * (ARENA_H - 80);
    const distFromCur = Math.hypot(tx - curX, ty - curY);
    if (distFromCur < 50 || distFromCur > 400) continue;

    const open = opennessScore(tx, ty);
    if (open < 22) continue; // too close to walls

    // Path must be clear
    if (!isPathClear(curX, curY, tx, ty)) continue;

    // Bonus for distance from ghosts
    let ghostBonus = 0;
    if (ghostIds) {
      ghostIds.forEach(gid => {
        const g = players[gid];
        if (g && g.alive) {
          const gd = Math.hypot(tx - g.x, ty - g.y);
          ghostBonus += Math.min(gd, 350) * 0.25;
        }
      });
    }

    const score = open * 1.5 + ghostBonus - distFromCur * 0.08;
    if (score > bestScore) {
      bestScore = score;
      bestX = tx;
      bestY = ty;
    }
  }

  // Fallback: if no good waypoint found, pick the most open nearby direction
  if (bestScore === -Infinity) {
    let bestAngle = Math.random() * Math.PI * 2;
    let bestOpen = 0;
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 8) {
      const rd = rayDir(curX, curY, a, 100);
      if (rd > bestOpen) { bestOpen = rd; bestAngle = a; }
    }
    bestX = curX + Math.cos(bestAngle) * 60;
    bestY = curY + Math.sin(bestAngle) * 60;
  }

  return {x: bestX, y: bestY};
}

function wallAvoidance(x, y, dirX, dirY) {
  let ax = 0, ay = 0;
  const lookAhead = 55;

  for (const w of WALLS) {
    const cx = Math.max(w.x, Math.min(x, w.x + w.w));
    const cy = Math.max(w.y, Math.min(y, w.y + w.h));
    const dx = x - cx;
    const dy = y - cy;
    const dist = Math.hypot(dx, dy);
    if (dist < lookAhead && dist > 0) {
      const strength = ((lookAhead - dist) / lookAhead);
      ax += (dx / dist) * strength * strength;
      ay += (dy / dist) * strength * strength;
    } else if (dist === 0) {
      ax += -dirY;
      ay += dirX;
    }
  }

  const margin = 40;
  if (x < margin) ax += ((margin - x) / margin) * 1.5;
  if (x > ARENA_W - margin) ax -= ((x - (ARENA_W - margin)) / margin) * 1.5;
  if (y < margin) ay += ((margin - y) / margin) * 1.5;
  if (y > ARENA_H - margin) ay -= ((y - (ARENA_H - margin)) / margin) * 1.5;

  return {x: ax, y: ay};
}

  const results = Object.values(players).map(p => ({
    name: p.name,

  titleEl.style.webkitBackgroundClip = 'text';
  titleEl.style.webkitTextFillColor = 'transparent';

}

// ============ HOST MESSAGE HANDLING ============
function handleHostMessage(conn, data) {
  if (data.type === 'join') {
    const colorIdx = Object.keys(players).length % COLORS.length;
    const spawnPos = getSpawnPos();
    players[conn.peer] = {
      id: conn.peer, name: data.name, color: colorIdx,
      x: spawnPos.x, y: spawnPos.y, isGhost: false,
      dir: {x:0,y:0}, score: 0, alive: true
    };
    conn.metadata = {peerId: conn.peer, name: data.name};
    // Send current state
    conn.send({type:'state', players, walls: WALLS, arenaW: ARENA_W, arenaH: ARENA_H});
    updatePlayersList();
    broadcast({type:'players_update', players});
  } else if (data.type === 'input') {
    if (players[conn.peer]) {
      players[conn.peer].dir = data.dir;
    }
  }
}

function handleClientMessage(data) {
  if (data.type === 'state') {
    players = data.players;
    myColor = players[myId]?.color || 0;
  } else if (data.type === 'tick') {
    // Update all players from host
    for (const id in data.players) {
      if (players[id]) {
        players[id].x = data.players[id].x;
        players[id].y = data.players[id].y;
        players[id].isGhost = data.players[id].isGhost;
        players[id].alive = data.players[id].alive;
      } else {
        players[id] = data.players[id];
      }
    }
    gameTime = data.time;
    updateHUD();
  } else if (data.type === 'game_start') {
    beginGame();
  } else if (data.type === 'game_end') {
    endGame(data.results);
  } else if (data.type === 'players_update') {
    // Update player list in lobby
    const oldIds = Object.keys(players);
    players = data.players;
    // Keep my entry
    if (!players[myId] && oldIds.includes(myId)) {
      // I was removed
    }
  }
}

// ============ BROADCAST ============
function broadcast(data) {
  connections.forEach(c => { if (c.open) c.send(data); });
}

// ============ SPAWN POSITIONS ============
function getSpawnPos() {
  const positions = [
    {x:120,y:110},{x:870,y:110},{x:120,y:580},{x:870,y:580},
    {x:500,y:350},{x:300,y:350},{x:700,y:350},{x:500,y:150},
    {x:350,y:550},{x:650,y:550}
  ];
  const used = Object.values(players).map(p => ({x:p.x, y:p.y}));
  for (const pos of positions) {
    if (!used.some(u => Math.hypot(u.x-pos.x, u.y-pos.y) < 60)) return pos;
  }
  return positions[Math.floor(Math.random() * positions.length)];
}

// ============ START GAME ============
function startGame() {
  if (Object.keys(players).length < 2) { alert('至少需要2位玩家'); return; }
  // Pick first ghost randomly
  const ids = Object.keys(players);
  const ghostIdx = Math.floor(Math.random() * ids.length);
  ids.forEach((id, i) => {
    const pos = getSpawnPos();
    players[id].x = pos.x;
    players[id].y = pos.y;
    players[id].isGhost = (i === ghostIdx);
    players[id].alive = true;
    players[id].score = 0;
    players[id].dir = {x:0, y:0};
  });
  gameTime = ROUND_TIME;
  broadcast({type:'state', players, walls:WALLS, arenaW:ARENA_W, arenaH:ARENA_H});
  broadcast({type:'game_start'});
  beginGame();
}

function beginGame() {
  gameRunning = true;
  showScreen('game-screen');
  initCanvas();
  // Countdown
  showCountdown(3, () => {
    // Start game loop
    if (isHost) {
      tickInterval = setInterval(hostTick, TICK_RATE);
      gameTimerInterval = setInterval(() => {
        gameTime--;
        if (gameTime <= 0) {
          gameTime = 0;
          finishGame();
        }
      }, 1000);
    }
    updateHUD();
    requestAnimationFrame(gameLoop);
  });
}

function showCountdown(n, cb) {
  const el = document.getElementById('countdown');
  const txt = document.getElementById('countdown-text');
  el.classList.add('active');
  let count = n;
  txt.textContent = count;
  const iv = setInterval(() => {
    count--;
    if (count > 0) {
      txt.textContent = count;
      txt.style.animation = 'none';
      void txt.offsetWidth;
      txt.style.animation = 'countPop .8s ease';
    } else if (count === 0) {
      txt.textContent = '开始!';
      txt.style.color = '#6bcb77';
      txt.style.animation = 'none';
      void txt.offsetWidth;
      txt.style.animation = 'countPop .8s ease';
    } else {
      clearInterval(iv);
      el.classList.remove('active');
      txt.style.color = '#ffd93d';
      cb();
    }
  }, 1000);
}

// ============ HOST TICK ============
function hostTick() {
  const ids = Object.keys(players);
  // Move players
  ids.forEach(id => {
    const p = players[id];
    if (!p.alive) return;
    const speed = p.isGhost ? GHOST_SPEED : PLAYER_SPEED;
    let nx = p.x + p.dir.x * speed;
    let ny = p.y + p.dir.y * speed;
    // Wall collision
    if (!collidesWall(nx, p.y, PLAYER_R)) p.x = nx;
    if (!collidesWall(p.x, ny, PLAYER_R)) p.y = ny;
    // Bounds
    p.x = Math.max(PLAYER_R, Math.min(ARENA_W - PLAYER_R, p.x));
    p.y = Math.max(PLAYER_R, Math.min(ARENA_H - PLAYER_R, p.y));
  });
  // Tag detection
  const ghosts = ids.filter(id => players[id].isGhost && players[id].alive);
  const runners = ids.filter(id => !players[id].isGhost && players[id].alive);
  ghosts.forEach(gid => {
    runners.forEach(rid => {
      const g = players[gid], r = players[rid];
      if (Math.hypot(g.x - r.x, g.y - r.y) < TAG_DIST) {
        r.isGhost = true;
        g.score += 10;
      }
    });
  });
  // Check game end
  const currentRunners = ids.filter(id => !players[id].isGhost && players[id].alive);
  if (currentRunners.length <= (ids.length > 2 ? 1 : 0) || currentRunners.length === 0) {
    finishGame();
    return;
  }
  // Broadcast tick
  const tickData = {};
  ids.forEach(id => {
    tickData[id] = {x:players[id].x, y:players[id].y, isGhost:players[id].isGhost, alive:players[id].alive};
  });
  broadcast({type:'tick', players:tickData, time:gameTime});
}

function finishGame() {
  clearInterval(tickInterval);
  clearInterval(gameTimerInterval);
  tickInterval = null;
  gameTimerInterval = null;
  gameRunning = false;
  // Calculate results
  const results = Object.values(players).map(p => ({
    name: p.name,
    score: p.score + (p.isGhost ? 0 : Math.floor(gameTime) * 2), // runners get time bonus
    survived: !p.isGhost
  })).sort((a,b) => b.score - a.score);
  broadcast({type:'game_end', results});
  endGame(results);
}

function endGame(results) {
  gameRunning = false;
  clearInterval(tickInterval);
  clearInterval(gameTimerInterval);
  const el = document.getElementById('result');
  const myResult = results.find(r => r.name === myName);
  const title = document.getElementById('result-title');
  const sub = document.getElementById('result-sub');
  if (myResult && myResult.survived) {
    title.textContent = '胜利!';
    title.style.background = 'linear-gradient(90deg,#ffd93d,#6bcb77)';
  } else {
    title.textContent = '被抓住了!';
    title.style.background = 'linear-gradient(90deg,#ff6b6b,#ee5a24)';
  }
  title.style.webkitBackgroundClip = 'text';
  title.style.webkitTextFillColor = 'transparent';
  sub.textContent = myResult ? `你的得分: ${myResult.score}` : '';
  const scoresEl = document.getElementById('result-scores');
  scoresEl.innerHTML = '';
  results.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `<span class="result-rank">${i===0?'👑':''} #${i+1} ${r.name} ${r.survived?'🏃':'👻'}</span><span class="result-score">${r.score}分</span>`;
    scoresEl.appendChild(row);
  });
  el.classList.add('active');
}

// ============ CANVAS ============
function initCanvas() {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  const hud = document.getElementById('game-hud');
  const hudH = hud.offsetHeight;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - hudH;
  canvas.style.marginTop = hudH + 'px';
  const scaleX = canvas.width / ARENA_W;
  const scaleY = canvas.height / ARENA_H;
  canvasScale = Math.min(scaleX, scaleY) * 0.95;
  canvasOffX = (canvas.width - ARENA_W * canvasScale) / 2;
  canvasOffY = (canvas.height - ARENA_H * canvasScale) / 2;
}

function toScreen(x, y) {
  return {x: x * canvasScale + canvasOffX, y: y * canvasScale + canvasOffY};
}

// ============ GAME LOOP (rendering) ============
function gameLoop() {
  if (!canvas) return;
  updateParticles();
  render();
  renderMinimap();
  if (gameRunning || document.getElementById('game-screen').classList.contains('active')) {
    requestAnimationFrame(gameLoop);
  }
}

// ============ PARTICLES ============
let particles = [];
const MAX_PARTICLES = 120;

function spawnParticle(x, y, color, life, vx, vy, size) {
  if (particles.length >= MAX_PARTICLES) particles.shift();
  particles.push({x, y, color, life, maxLife:life, vx:vx||0, vy:vy||0, size:size||3});
}

function updateParticles() {
  // Spawn trail particles for moving players
  const ids = Object.keys(players);
  ids.forEach(id => {
    const p = players[id];
    if (!p.alive || (p.dir.x === 0 && p.dir.y === 0)) return;
    if (Math.random() < 0.3) {
      const c = p.isGhost ? 'rgba(255,80,80,' : `rgba(${hexToRgb(COLORS[p.color]||COLORS[0])},`;
      spawnParticle(p.x + (Math.random()-0.5)*8, p.y + (Math.random()-0.5)*8,
        c, 400 + Math.random()*300,
        -p.dir.x * 0.3 + (Math.random()-0.5)*0.5,
        -p.dir.y * 0.3 + (Math.random()-0.5)*0.5,
        2 + Math.random()*3);
    }
  });
  // Update existing
  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.life -= 16;
    if (pt.life <= 0) { particles.splice(i, 1); continue; }
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vx *= 0.96;
    pt.vy *= 0.96;
  }
}

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return `${(n>>16)&0xff},${(n>>8)&0xff},${n&0xff}`;
}

// ============ RENDER ============
let frameCount = 0;

function render() {
  frameCount++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const tl = toScreen(0, 0);
  const br = toScreen(ARENA_W, ARENA_H);
  const aw = br.x - tl.x, ah = br.y - tl.y;

  // Arena floor with radial gradient
  const floorGrad = ctx.createRadialGradient(tl.x + aw/2, tl.y + ah/2, 0, tl.x + aw/2, tl.y + ah/2, Math.max(aw, ah) * 0.7);
  floorGrad.addColorStop(0, '#151b24');
  floorGrad.addColorStop(1, '#0d1117');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(tl.x, tl.y, aw, ah);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= ARENA_W; x += 50) {
    const s = toScreen(x, 0), e = toScreen(x, ARENA_H);
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
  }
  for (let y = 0; y <= ARENA_H; y += 50) {
    const s = toScreen(0, y), e = toScreen(ARENA_W, y);
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
  }

  // Particles (behind walls)
  particles.forEach(pt => {
    const s = toScreen(pt.x, pt.y);
    const alpha = (pt.life / pt.maxLife) * 0.6;
    const sz = pt.size * canvasScale * (pt.life / pt.maxLife);
    ctx.fillStyle = pt.color + alpha + ')';
    ctx.beginPath();
    ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
    ctx.fill();
  });

  // Walls with 3D effect
  WALLS.forEach(w => {
    const s = toScreen(w.x, w.y);
    const rw = w.w * canvasScale, rh = w.h * canvasScale;
    const rad = Math.min(6, rw/3, rh/3);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.roundRect(s.x + 3, s.y + 3, rw, rh, rad); ctx.fill();

    // Wall body gradient
    const wg = ctx.createLinearGradient(s.x, s.y, s.x, s.y + rh);
    wg.addColorStop(0, '#3d4450');
    wg.addColorStop(1, '#262b33');
    ctx.fillStyle = wg;
    ctx.beginPath(); ctx.roundRect(s.x, s.y, rw, rh, rad); ctx.fill();

    // Top highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(s.x + 1, s.y + 1, rw - 2, rh - 2, rad); ctx.stroke();

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.roundRect(s.x, s.y, rw, rh, rad); ctx.stroke();
  });

  // Arena border with glow
  ctx.shadowColor = '#4d96ff';
  ctx.shadowBlur = 12;
  ctx.strokeStyle = 'rgba(77,150,255,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(tl.x, tl.y, aw, ah, 10); ctx.stroke();
  ctx.shadowBlur = 0;

  // Players
  const ids = Object.keys(players);
  const runners = ids.filter(id => !players[id].isGhost);
  const ghosts = ids.filter(id => players[id].isGhost);
  runners.forEach(id => drawPlayer(players[id], false));
  ghosts.forEach(id => drawPlayer(players[id], true));
}

function drawPlayer(p, isGhost) {
  const s = toScreen(p.x, p.y);
  const r = PLAYER_R * canvasScale;
  const color = COLORS[p.color] || COLORS[0];
  const t = frameCount * 0.05;

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(s.x + 1, s.y + r * 0.9, r * 0.7, r * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  if (isGhost) {
    // === GHOST AURA (pulsing glow) ===
    const pulse = 0.85 + Math.sin(t * 2.5) * 0.15;
    const auraR = r * 2.8 * pulse;
    const aura = ctx.createRadialGradient(s.x, s.y - r * 0.15, r * 0.2, s.x, s.y, auraR);
    aura.addColorStop(0, 'rgba(255,70,70,0.18)');
    aura.addColorStop(0.4, 'rgba(255,50,50,0.07)');
    aura.addColorStop(1, 'rgba(255,30,30,0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(s.x, s.y, auraR, 0, Math.PI * 2); ctx.fill();

    // === GHOST BODY (dome top + wavy bottom) ===
    const bob = Math.sin(t * 3) * r * 0.06;
    const bodyTop = s.y - r * 1.05 + bob;
    const bodyBot = s.y + r * 0.95 + bob;
    const bodyW = r * 1.05;

    // Ghost body gradient
    const gg = ctx.createLinearGradient(s.x, bodyTop, s.x, bodyBot);
    gg.addColorStop(0, 'rgba(255,220,220,0.95)');
    gg.addColorStop(0.35, 'rgba(255,120,120,0.88)');
    gg.addColorStop(0.7, 'rgba(230,60,60,0.82)');
    gg.addColorStop(1, 'rgba(180,30,30,0.5)');
    ctx.fillStyle = gg;

    ctx.beginPath();
    ctx.moveTo(s.x - bodyW, bodyBot);
    // Left side up
    ctx.quadraticCurveTo(s.x - bodyW * 1.05, s.y - r * 0.2 + bob, s.x - bodyW * 0.6, bodyTop + r * 0.3);
    // Dome top
    ctx.quadraticCurveTo(s.x, bodyTop - r * 0.25, s.x + bodyW * 0.6, bodyTop + r * 0.3);
    // Right side down
    ctx.quadraticCurveTo(s.x + bodyW * 1.05, s.y - r * 0.2 + bob, s.x + bodyW, bodyBot);
    // Wavy bottom (3 bumps)
    const wavePhase = t * 4;
    for (let i = 0; i < 3; i++) {
      const x1 = s.x + bodyW - (i * 2 + 1) * bodyW / 3;
      const x2 = s.x + bodyW - (i * 2 + 2) * bodyW / 3;
      const waveY = Math.sin(wavePhase + i * 1.8) * r * 0.12;
      ctx.quadraticCurveTo(
        (x1 + x2) / 2, bodyBot + r * 0.22 + waveY,
        x2, bodyBot
      );
    }
    ctx.closePath();
    ctx.fill();

    // Ghost body outline
    ctx.strokeStyle = 'rgba(255,130,130,0.35)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.ellipse(s.x - r * 0.15, s.y - r * 0.35 + bob, r * 0.3, r * 0.18, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // === GHOST EYES ===
    const eyeY = s.y - r * 0.15 + bob;
    const eyeSpacing = r * 0.32;
    const eyeW = r * 0.22;
    const eyeH = r * 0.3;

    // Eye whites (glowing)
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = r * 0.4;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(s.x - eyeSpacing, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s.x + eyeSpacing, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // Pupils (look toward movement direction)
    const pdx = (p.dir.x || 0) * r * 0.06;
    const pdy = (p.dir.y || 0) * r * 0.06;
    ctx.fillStyle = '#1a0000';
    ctx.beginPath(); ctx.arc(s.x - eyeSpacing + pdx, eyeY + pdy, r * 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x + eyeSpacing + pdx, eyeY + pdy, r * 0.1, 0, Math.PI * 2); ctx.fill();

  } else {
    // === HUMAN CHARACTER ===
    const isMoving = (p.dir.x !== 0 || p.dir.y !== 0);
    const walkPhase = isMoving ? frameCount * 0.18 : 0;
    const legSwing = isMoving ? Math.sin(walkPhase) * r * 0.3 : 0;
    const armSwing = isMoving ? Math.sin(walkPhase) * r * 0.2 : 0;
    const bodyBob = isMoving ? Math.abs(Math.sin(walkPhase)) * r * 0.04 : 0;

    // Subtle aura
    const hAura = ctx.createRadialGradient(s.x, s.y, r * 0.3, s.x, s.y, r * 1.6);
    hAura.addColorStop(0, `rgba(${hexToRgb(color)},0.06)`);
    hAura.addColorStop(1, `rgba(${hexToRgb(color)},0)`);
    ctx.fillStyle = hAura;
    ctx.beginPath(); ctx.arc(s.x, s.y, r * 1.6, 0, Math.PI * 2); ctx.fill();

    const bodyY = s.y - bodyBob;

    // === LEGS ===
    ctx.strokeStyle = '#555';
    ctx.lineWidth = Math.max(2, r * 0.16);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(s.x - r * 0.18, bodyY + r * 0.35);
    ctx.lineTo(s.x - r * 0.22, bodyY + r * 0.85 + legSwing);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s.x + r * 0.18, bodyY + r * 0.35);
    ctx.lineTo(s.x + r * 0.22, bodyY + r * 0.85 - legSwing);
    ctx.stroke();

    // Shoes
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.ellipse(s.x - r * 0.22, bodyY + r * 0.88 + legSwing, r * 0.12, r * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s.x + r * 0.22, bodyY + r * 0.88 - legSwing, r * 0.12, r * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();

    // === BODY / TORSO ===
    const torsoGrad = ctx.createLinearGradient(s.x, bodyY - r * 0.35, s.x, bodyY + r * 0.4);
    torsoGrad.addColorStop(0, lightenColor(color, 25));
    torsoGrad.addColorStop(1, color);
    ctx.fillStyle = torsoGrad;
    ctx.beginPath();
    ctx.moveTo(s.x - r * 0.35, bodyY - r * 0.25);
    ctx.lineTo(s.x + r * 0.35, bodyY - r * 0.25);
    ctx.quadraticCurveTo(s.x + r * 0.38, bodyY + r * 0.05, s.x + r * 0.28, bodyY + r * 0.4);
    ctx.lineTo(s.x - r * 0.28, bodyY + r * 0.4);
    ctx.quadraticCurveTo(s.x - r * 0.38, bodyY + r * 0.05, s.x - r * 0.35, bodyY - r * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = `rgba(${hexToRgb(color)},0.5)`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // === ARMS ===
    ctx.strokeStyle = lightenColor(color, -15);
    ctx.lineWidth = Math.max(2, r * 0.14);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(s.x - r * 0.38, bodyY - r * 0.15);
    ctx.lineTo(s.x - r * 0.52, bodyY + r * 0.2 - armSwing);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s.x + r * 0.38, bodyY - r * 0.15);
    ctx.lineTo(s.x + r * 0.52, bodyY + r * 0.2 + armSwing);
    ctx.stroke();

    // Hands
    ctx.fillStyle = '#f5d0a9';
    ctx.beginPath(); ctx.arc(s.x - r * 0.52, bodyY + r * 0.22 - armSwing, r * 0.07, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x + r * 0.52, bodyY + r * 0.22 + armSwing, r * 0.07, 0, Math.PI * 2); ctx.fill();

    // === HEAD ===
    const headR = r * 0.38;
    const headY = bodyY - r * 0.55;

    // Head circle
    const headGrad = ctx.createRadialGradient(s.x - headR * 0.2, headY - headR * 0.2, headR * 0.1, s.x, headY, headR);
    headGrad.addColorStop(0, '#ffe4c4');
    headGrad.addColorStop(1, '#f0c8a0');
    ctx.fillStyle = headGrad;
    ctx.beginPath(); ctx.arc(s.x, headY, headR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(180,140,100,0.4)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Hair
    ctx.fillStyle = '#4a3728';
    ctx.beginPath();
    ctx.arc(s.x, headY - headR * 0.15, headR * 1.02, Math.PI * 1.15, Math.PI * 1.85);
    ctx.quadraticCurveTo(s.x, headY - headR * 1.15, s.x + headR * 0.85, headY - headR * 0.3);
    ctx.closePath();
    ctx.fill();

    // Eyes
    const hEyeY = headY + headR * 0.05;
    const hEyeSpacing = headR * 0.35;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(s.x - hEyeSpacing, hEyeY, headR * 0.16, headR * 0.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s.x + hEyeSpacing, hEyeY, headR * 0.16, headR * 0.2, 0, 0, Math.PI * 2); ctx.fill();

    // Pupils
    const hPdx = (p.dir.x || 0) * headR * 0.08;
    const hPdy = (p.dir.y || 0) * headR * 0.08;
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(s.x - hEyeSpacing + hPdx, hEyeY + hPdy, headR * 0.09, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x + hEyeSpacing + hPdx, hEyeY + hPdy, headR * 0.09, 0, Math.PI * 2); ctx.fill();

    // Mouth
    ctx.strokeStyle = '#a0705a';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(s.x, hEyeY + headR * 0.35, headR * 0.15, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }

  // === NAME TAG ===
  const nameFont = Math.max(10, Math.floor(r * 0.6));
  ctx.font = `bold ${nameFont}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const tw = ctx.measureText(p.name).width;
  const tagY = s.y - r * 1.35;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.roundRect(s.x - tw/2 - 5, tagY - nameFont/2 - 2, tw + 10, nameFont + 4, 4); ctx.fill();
  ctx.fillStyle = isGhost ? '#ff9999' : 'rgba(255,255,255,0.9)';
  ctx.fillText(p.name, s.x, tagY);

  // === SELF HIGHLIGHT (animated ring) ===
  if (p.id === myId) {
    const dashOff = frameCount * 0.8;
    ctx.beginPath(); ctx.arc(s.x, s.y, r + 5, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffd93d';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.lineDashOffset = dashOff;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
  }
}

// ============ MINIMAP ============
function renderMinimap() {
  const mc = document.getElementById('minimap');
  if (!mc) return;
  const mctx = mc.getContext('2d');
  mc.width = 120; mc.height = 90;
  const mw = mc.width, mh = mc.height;
  const sx = mw / ARENA_W, sy = mh / ARENA_H;

  mctx.clearRect(0, 0, mw, mh);
  mctx.fillStyle = 'rgba(13,17,23,0.9)';
  mctx.fillRect(0, 0, mw, mh);

  // Walls
  mctx.fillStyle = 'rgba(60,68,80,0.6)';
  WALLS.forEach(w => {
    mctx.fillRect(w.x * sx, w.y * sy, Math.max(2, w.w * sx), Math.max(2, w.h * sy));
  });

  // Players
  const ids = Object.keys(players);
  ids.forEach(id => {
    const p = players[id];
    if (!p.alive) return;
    const px = p.x * sx, py = p.y * sy;
    const pr = p.isGhost ? 3.5 : 3;
    if (p.isGhost) {
      mctx.fillStyle = '#ff4444';
    } else if (id === myId) {
      mctx.fillStyle = '#ffd93d';
    } else {
      mctx.fillStyle = COLORS[p.color] || '#4d96ff';
    }
    mctx.beginPath(); mctx.arc(px, py, pr, 0, Math.PI * 2); mctx.fill();
    if (id === myId) {
      mctx.strokeStyle = '#ffd93d';
      mctx.lineWidth = 1;
      mctx.stroke();
    }
  });
}

function lightenColor(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (num >> 16) + pct);
  const g = Math.min(255, ((num >> 8) & 0xff) + pct);
  const b = Math.min(255, (num & 0xff) + pct);
  return `rgb(${r},${g},${b})`;
}

// ============ WALL COLLISION ============
function collidesWall(x, y, r) {
  for (const w of WALLS) {
    const cx = Math.max(w.x, Math.min(x, w.x + w.w));
    const cy = Math.max(w.y, Math.min(y, w.y + w.h));
    if (Math.hypot(x - cx, y - cy) < r) return true;
  }
  return false;
}

// ============ HUD ============
function updateHUD() {
  const timer = document.getElementById('hud-timer');
  if (isSinglePlayer) {
    const mins = Math.floor(gameTime / 60);
    const secs = Math.ceil(gameTime % 60);
    timer.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
    timer.className = 'hud-timer' + (gameTime <= 30 ? ' urgent' : '');
  } else {
    timer.textContent = Math.ceil(gameTime);
    timer.className = 'hud-timer' + (gameTime <= 15 ? ' urgent' : '');
  }

  const me = players[myId];
  const role = document.getElementById('hud-role');
  if (me && me.isGhost) {
    role.textContent = '👻 鬼';
    role.className = 'hud-role ghost';
  } else {
    role.textContent = '🏃 人类';
    role.className = 'hud-role runner';
  }

  const ghostCount = Object.values(players).filter(p => p.isGhost).length;
  const runnerCount = Object.values(players).filter(p => !p.isGhost).length;
  document.getElementById('hud-players').textContent = `👻 ${ghostCount} | 🏃 ${runnerCount}`;
}

// ============ INPUT: KEYBOARD ============
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  const dirs = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
    w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
  if (dirs[e.key]) {
    e.preventDefault();
    myDir = dirs[e.key];
    if (isHost && players[myId]) players[myId].dir = myDir;
    sendInput(myDir);
  }
});
document.addEventListener('keyup', e => {
  if (!gameRunning) return;
  const dirs = {ArrowUp:1,ArrowDown:1,ArrowLeft:1,ArrowRight:1,w:1,s:1,a:1,d:1,W:1,S:1,A:1,D:1};
  if (dirs[e.key]) {
    myDir = {x:0, y:0};
    if (isHost && players[myId]) players[myId].dir = myDir;
    sendInput(myDir);
  }
});

// ============ INPUT: JOYSTICK ============
const jZone = document.getElementById('joystick-zone');
const jKnob = document.getElementById('joystick-knob');
const jBase = document.getElementById('joystick-base');

jZone.addEventListener('touchstart', e => {
  e.preventDefault();
  joystickActive = true;
  const rect = jBase.getBoundingClientRect();
  joystickCenter = {x: rect.left + rect.width/2, y: rect.top + rect.height/2};
}, {passive:false});

document.addEventListener('touchmove', e => {
  if (!joystickActive) return;
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - joystickCenter.x;
  const dy = t.clientY - joystickCenter.y;
  const dist = Math.hypot(dx, dy);
  const maxDist = 45;
  const clampDist = Math.min(dist, maxDist);
  const angle = Math.atan2(dy, dx);
  const nx = Math.cos(angle) * clampDist;
  const ny = Math.sin(angle) * clampDist;
  jKnob.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
  if (dist > 8) {
    myDir = {x: Math.cos(angle), y: Math.sin(angle)};
  } else {
    myDir = {x:0, y:0};
  }
  if (isHost && players[myId]) players[myId].dir = myDir;
  sendInput(myDir);
}, {passive:false});

document.addEventListener('touchend', e => {
  if (!joystickActive) return;
  joystickActive = false;
  jKnob.style.transform = 'translate(-50%, -50%)';
  myDir = {x:0, y:0};
  if (isHost && players[myId]) players[myId].dir = myDir;
  sendInput(myDir);
});

// Mouse joystick support for desktop testing
jZone.addEventListener('mousedown', e => {
  e.preventDefault();
  joystickActive = true;
  const rect = jBase.getBoundingClientRect();
  joystickCenter = {x: rect.left + rect.width/2, y: rect.top + rect.height/2};
});
document.addEventListener('mousemove', e => {
  if (!joystickActive) return;
  const dx = e.clientX - joystickCenter.x;
  const dy = e.clientY - joystickCenter.y;
  const dist = Math.hypot(dx, dy);
  const maxDist = 45;
  const clampDist = Math.min(dist, maxDist);
  const angle = Math.atan2(dy, dx);
  const nx = Math.cos(angle) * clampDist;
  const ny = Math.sin(angle) * clampDist;
  jKnob.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
  if (dist > 8) {
    myDir = {x: Math.cos(angle), y: Math.sin(angle)};
  } else {
    myDir = {x:0, y:0};
  }
  if (isHost && players[myId]) players[myId].dir = myDir;
  sendInput(myDir);
});
document.addEventListener('mouseup', () => {
  if (!joystickActive) return;
  joystickActive = false;
  jKnob.style.transform = 'translate(-50%, -50%)';
  myDir = {x:0, y:0};
  if (isHost && players[myId]) players[myId].dir = myDir;
  sendInput(myDir);
});

// ============ NETWORK: SEND INPUT ============
let lastInputSend = 0;
function sendInput(dir) {
  const now = Date.now();
  if (now - lastInputSend < 50) return; // throttle
  lastInputSend = now;
  if (!isHost && connections.length > 0) {
    connections[0].send({type:'input', dir});
  }
}

// ============ INIT: Check for invite link ============
if (!checkUrlParams()) {
  // Normal page load, show main screen
}

// ============ PWA ============
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Prevent default touch behavior
document.addEventListener('touchstart', e => {
  if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') e.preventDefault();
}, {passive:false});
</script>
