// ============ SINGLE PLAYER MODE ============
const SP_TIME = 300; // 5 minutes
const BOT_NAMES = ['小灰','小白','小黑','小黄','小粉','小橙','小紫','小绿'];
const AI_WANDER_CHANGE = 3000; // ms between random direction changes
const AI_DETECT_GHOST = 220; // px distance to start fleeing
const AI_RAY_LENGTH = 80; // ray-cast distance for wall look-ahead
const AI_STUCK_TIME = 1200; // ms before stuck detection kicks in
const AI_CORNER_PENALTY = 60; // distance threshold for corner detection

let isSinglePlayer = false;
let spRole = ''; // 'ghost' or 'runner'
let bots = []; // AI bot objects
let spTickInterval = null;
let spTimerInterval = null;

function showRoleSelect() {
  hideAllCards();
  document.getElementById('card-role').style.display = '';
}

function startSinglePlayer(role) {
  isSinglePlayer = true;
  spRole = role;
  isHost = true; // we run the game logic locally
  myName = document.getElementById('player-name').value.trim() || NAMES_DEFAULT[Math.floor(Math.random() * NAMES_DEFAULT.length)];
  myColor = role === 'ghost' ? 0 : 1;
  roomCode = 'SINGLE';

  // Create players
  players = {};
  bots = [];
  const spawnPositions = [
    {x:500,y:350},{x:120,y:110},{x:870,y:110},{x:120,y:580},{x:870,y:580}
  ];

  // Player
  const myPlayerId = 'player-self';
  const playerIsGhost = (role === 'ghost');
  players[myPlayerId] = {
    id: myPlayerId, name: myName, color: myColor,
    x: spawnPositions[0].x, y: spawnPositions[0].y,
    isGhost: playerIsGhost, dir: {x:0,y:0}, score: 0, alive: true
  };
  myId = myPlayerId;

  // Create 4 bots
  const botNames = shuffleCopy(BOT_NAMES).slice(0, 4);
  for (let i = 0; i < 4; i++) {
    const botId = 'bot-' + i;
    // Ghost mode: player=ghost, all 4 bots=runners (opponents)
    // Runner mode: 1 bot=ghost (opponent), 3 bots=runners (teammates)
    const botIsGhost = (role === 'runner' && i === 0);
    const botColor = (i + 2) % COLORS.length;
    const pos = spawnPositions[i + 1] || {x: 200 + Math.random()*400, y: 200 + Math.random()*200};
    players[botId] = {
      id: botId, name: botNames[i], color: botColor,
      x: pos.x, y: pos.y,
      isGhost: botIsGhost, dir: {x:0,y:0}, score: 0, alive: true
    };
    bots.push({
      id: botId,
      dir: {x:0, y:0},
      wanderTimer: Math.random() * 2000,
      targetX: pos.x,
      targetY: pos.y,
      stuckTimer: 0,
      lastX: pos.x,
      lastY: pos.y,
      isStuck: false
    });
  }

  gameTime = SP_TIME;
  connections = [];
  gameRunning = true;
  mapItems = [];
  playerEffects = {};
  lastItemSpawn = Date.now() - ITEM_SPAWN_INTERVAL + 3000;
  dashCooldown = 0;
  dashTimer = 0;

  // Start game
  showScreen('game-screen');
  initCanvas();
  showCountdown(3, () => {
    spTickInterval = setInterval(singlePlayerTick, TICK_RATE);
    spTimerInterval = setInterval(() => {
      gameTime--;
      if (gameTime <= 0) {
        gameTime = 0;
        finishSinglePlayer();
      }
    }, 1000);
    updateHUD();
    requestAnimationFrame(gameLoop);
  });
}

function shuffleCopy(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============ SINGLE PLAYER TICK ============
function singlePlayerTick() {
  const ids = Object.keys(players);

  // Update AI bots
  updateBots();

  // Move all players (same as hostTick)
  ids.forEach(id => {
    const p = players[id];
    if (!p.alive) return;
    // Frozen ghosts don't move
    if (hasEffect(id, 'frozen')) return;
    // Dash movement
    if (id === myId && dashTimer > 0) {
      const dashSpd = PLAYER_SPEED * DASH_SPEED_MULT;
      const dnx = p.x + (p._dashDx||0) * dashSpd;
      const dny = p.y + (p._dashDy||0) * dashSpd;
      if (!collidesWall(dnx, p.y, PLAYER_R)) p.x = dnx;
      if (!collidesWall(p.x, dny, PLAYER_R)) p.y = dny;
      dashTimer -= TICK_RATE;
      if (dashTimer <= 0) dashTimer = 0;
    } else {
      const mult = getSpeedMult(id);
      const speed = (p.isGhost ? GHOST_SPEED : PLAYER_SPEED) * mult;
      let nx = p.x + p.dir.x * speed;
      let ny = p.y + p.dir.y * speed;
      if (!collidesWall(nx, p.y, PLAYER_R)) p.x = nx;
      if (!collidesWall(p.x, ny, PLAYER_R)) p.y = ny;
    }
    p.x = Math.max(PLAYER_R, Math.min(ARENA_W - PLAYER_R, p.x));
    p.y = Math.max(PLAYER_R, Math.min(ARENA_H - PLAYER_R, p.y));
  });

  // Tag detection (with shield/invisible protection)
  const ghosts = ids.filter(id => players[id].isGhost && players[id].alive);
  const runners = ids.filter(id => !players[id].isGhost && players[id].alive);
  ghosts.forEach(gid => {
    runners.forEach(rid => {
      const g = players[gid], r = players[rid];
      if (Math.hypot(g.x - r.x, g.y - r.y) < TAG_DIST) {
        if (hasEffect(rid, 'shield')) {
          playerEffects[rid].shieldEnd = 0;
          g.score = Math.max(0, g.score - 5);
          for (let j = 0; j < 6; j++) spawnParticle(r.x, r.y, '#ffd93d', 400, (Math.random()-.5)*3, (Math.random()-.5)*3, 3);
        } else if (!hasEffect(rid, 'invisible')) {
          r.isGhost = true;
          g.score += 10;
        }
      }
    });
  });

  // Item spawning & expiry
  const now = Date.now();
  if (now - lastItemSpawn > ITEM_SPAWN_INTERVAL) { spawnItem(); lastItemSpawn = now; }
  mapItems = mapItems.filter(item => {
    if (now - item.spawnTime > ITEM_LIFETIME) { return false; }
    return true;
  });
  // Item pickup
  ids.forEach(id => checkItemPickup(id));

  // Check game end
  const currentRunners = ids.filter(id => !players[id].isGhost && players[id].alive);
  if (currentRunners.length === 0) {
    finishSinglePlayer();
  }

  updateHUD();
}

// ============ AI BOT LOGIC (v2 - improved) ============
function updateBots() {
  const ids = Object.keys(players);
  const allGhosts = ids.filter(id => players[id].isGhost && players[id].alive);
  const allRunners = ids.filter(id => !players[id].isGhost && players[id].alive);

  bots.forEach(bot => {
    const p = players[bot.id];
    if (!p || !p.alive) return;

    // Frozen ghosts can't move
    if (hasEffect(bot.id, 'frozen')) { bot.dir = {x:0,y:0}; return; }

    const moved = Math.hypot(p.x - bot.lastX, p.y - bot.lastY);
    if (moved < 0.5) {
      bot.stuckTimer += TICK_RATE;
    } else {
      bot.stuckTimer = 0;
      bot.isStuck = false;
    }
    bot.lastX = p.x;
    bot.lastY = p.y;
    if (bot.stuckTimer > AI_STUCK_TIME) bot.isStuck = true;

    if (p.isGhost) {
      updateGhostBot(bot, p, allRunners);
    } else {
      updateRunnerBot(bot, p, allGhosts);
    }

    p.dir = {...bot.dir};
  });
}

// ---- Ray-cast helpers ----
function rayHitsWall(x, y, dx, dy, maxDist) {
  const step = 5;
  const steps = Math.ceil(maxDist / step);
  for (let i = 1; i <= steps; i++) {
    const t = (i / steps) * maxDist;
    if (pointInWall(x + dx * t, y + dy * t)) return t;
  }
  return maxDist;
}

function pointInWall(px, py) {
  for (const w of WALLS) {
    if (px >= w.x - 2 && px <= w.x + w.w + 2 && py >= w.y - 2 && py <= w.y + w.h + 2) return true;
  }
  return false;
}

function rayDir(x, y, angle, maxDist) {
  return rayHitsWall(x, y, Math.cos(angle), Math.sin(angle), maxDist);
}

function bestPerpDir(x, y, baseAngle) {
  const leftAngle = baseAngle + Math.PI / 2;
  const rightAngle = baseAngle - Math.PI / 2;
  const leftDist = rayDir(x, y, leftAngle, AI_RAY_LENGTH);
  const rightDist = rayDir(x, y, rightAngle, AI_RAY_LENGTH);
  if (leftDist > rightDist) return {x: Math.cos(leftAngle), y: Math.sin(leftAngle)};
  return {x: Math.cos(rightAngle), y: Math.sin(rightAngle)};
}

function opennessScore(x, y) {
  let minDist = Infinity;
  for (const w of WALLS) {
    const cx = Math.max(w.x, Math.min(x, w.x + w.w));
    const cy = Math.max(w.y, Math.min(y, w.y + w.h));
    minDist = Math.min(minDist, Math.hypot(x - cx, y - cy));
  }
  minDist = Math.min(minDist, x, y, ARENA_W - x, ARENA_H - y);
  return minDist;
}

// Check if path between two points is clear of walls
function isPathClear(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.hypot(dx, dy);
  if (dist < 5) return true;
  const steps = Math.ceil(dist / 12);
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    if (pointInWall(x1 + dx * t, y1 + dy * t)) return false;
  }
  return true;
}

// Find the safest direction to flee, evaluating multiple candidate directions
function findSafestFleeDir(x, y, ghostDists) {
  let bestAngle = 0, bestScore = -Infinity;
  for (let a = 0; a < Math.PI * 2; a += Math.PI / 12) {
    const rayDist = rayDir(x, y, a, 120);
    if (rayDist < 18) continue; // skip directions blocked by nearby wall

    // Score destination point at 80px in this direction
    const destX = x + Math.cos(a) * 80;
    const destY = y + Math.sin(a) * 80;
    let score = opennessScore(destX, destY) * 2;
    score += Math.min(rayDist, 100);

    // Bonus: path to destination is clear
    if (isPathClear(x, y, destX, destY)) score += 60;

    // Bonus: farther from all ghosts
    ghostDists.forEach(g => {
      const gd = Math.hypot(destX - g.x, destY - g.y);
      score += Math.min(gd, 250) * 0.4;
    });

    if (score > bestScore) { bestScore = score; bestAngle = a; }
  }
  return {x: Math.cos(bestAngle), y: Math.sin(bestAngle)};
}

// ---- Ghost AI ----
function updateGhostBot(bot, me, runnerIds) {
  if (runnerIds.length === 0) { bot.dir = {x:0,y:0}; return; }

  let nearest = null, nearDist = Infinity;
  runnerIds.forEach(rid => {
    const r = players[rid];
    if (!r || !r.alive) return;
    const d = Math.hypot(r.x - me.x, r.y - me.y);
    if (d < nearDist) { nearDist = d; nearest = r; }
  });
  if (!nearest) { bot.dir = {x:0,y:0}; return; }

  const dx = nearest.x - me.x;
  const dy = nearest.y - me.y;
  const dist = Math.hypot(dx, dy);
  if (dist < 1) { bot.dir = {x:0,y:0}; return; }

  let desiredX = dx / dist;
  let desiredY = dy / dist;
  const baseAngle = Math.atan2(desiredY, desiredX);

  // Forward ray-cast: wall ahead?
  const fwdDist = rayDir(me.x, me.y, baseAngle, AI_RAY_LENGTH);
  if (fwdDist < 35) {
    const perp = bestPerpDir(me.x, me.y, baseAngle);
    const blend = Math.max(0, 1 - fwdDist / 35);
    desiredX = desiredX * (1 - blend * 0.8) + perp.x * blend * 0.8;
    desiredY = desiredY * (1 - blend * 0.8) + perp.y * blend * 0.8;
  }

  const avoid = wallAvoidance(me.x, me.y, desiredX, desiredY);
  desiredX += avoid.x * 2.0;
  desiredY += avoid.y * 2.0;

  const len = Math.hypot(desiredX, desiredY);
  if (len > 0) { bot.dir = {x: desiredX/len, y: desiredY/len}; }
}

// ---- Runner AI (v2 - major improvements) ----
function updateRunnerBot(bot, me, ghostIds) {
  // Detect ghosts and compute flee vectors
  let fleeX = 0, fleeY = 0, fleeing = false;
  const activeGhosts = [];

  ghostIds.forEach(gid => {
    const g = players[gid];
    if (!g || !g.alive) return;
    const dx = me.x - g.x;
    const dy = me.y - g.y;
    const d = Math.hypot(dx, dy);
    if (d < AI_DETECT_GHOST && d > 0) {
      const strength = (AI_DETECT_GHOST - d) / AI_DETECT_GHOST;
      fleeX += (dx / d) * strength;
      fleeY += (dy / d) * strength;
      fleeing = true;
      activeGhosts.push(g);
    }
  });

  let desiredX, desiredY;

  if (bot.isStuck) {
    // === STUCK ESCAPE: full surround scan to find most open direction ===
    let bestAngle = 0, bestScore = -1;
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 16) {
      const rd = rayDir(me.x, me.y, a, AI_RAY_LENGTH * 1.5);
      const destOpen = opennessScore(
        me.x + Math.cos(a) * 50,
        me.y + Math.sin(a) * 50
      );
      const score = rd * 0.6 + destOpen * 0.4;
      if (score > bestScore) { bestScore = score; bestAngle = a; }
    }
    desiredX = Math.cos(bestAngle);
    desiredY = Math.sin(bestAngle);
    bot.wanderTimer = 0;
    if (bot.stuckTimer > AI_STUCK_TIME * 1.5) {
      bot.stuckTimer = 0;
      bot.isStuck = false;
    }

  } else if (fleeing) {
    // === FLEE MODE ===
    // Check if surrounded on 3+ sides (dead end / corridor trap)
    let blockedSides = 0;
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
      if (rayDir(me.x, me.y, a, 35) < 20) blockedSides++;
    }

    if (blockedSides >= 5) {
      // Deeply trapped - use full safest-direction scan
      const safest = findSafestFleeDir(me.x, me.y, activeGhosts);
      desiredX = safest.x;
      desiredY = safest.y;
    } else if (blockedSides >= 3) {
      // In a corridor or near dead-end - evaluate carefully
      const fleeAngle = Math.atan2(fleeY, fleeX);
      const fwdBlocked = rayDir(me.x, me.y, fleeAngle, 45) < 25;

      if (fwdBlocked) {
        // Can't go forward, use safest direction
        const safest = findSafestFleeDir(me.x, me.y, activeGhosts);
        desiredX = safest.x;
        desiredY = safest.y;
      } else {
        // Can go forward but check sides
        const perp = bestPerpDir(me.x, me.y, fleeAngle);
        desiredX = fleeX; desiredY = fleeY;
        const fl = Math.hypot(desiredX, desiredY);
        if (fl > 0) { desiredX /= fl; desiredY /= fl; }
        desiredX = desiredX * 0.5 + perp.x * 0.5;
        desiredY = desiredY * 0.5 + perp.y * 0.5;
      }
    } else {
      // Open area - normal flee with wall check
      const fleeAngle = Math.atan2(fleeY, fleeX);
      desiredX = Math.cos(fleeAngle);
      desiredY = Math.sin(fleeAngle);

      const fleeRayDist = rayDir(me.x, me.y, fleeAngle, AI_RAY_LENGTH);
      if (fleeRayDist < 30) {
        const perp = bestPerpDir(me.x, me.y, fleeAngle);
        desiredX = perp.x;
        desiredY = perp.y;
      } else if (fleeRayDist < 55) {
        const perp = bestPerpDir(me.x, me.y, fleeAngle);
        const blend = (55 - fleeRayDist) / 25;
        desiredX = desiredX * (1 - blend) + perp.x * blend;
        desiredY = desiredY * (1 - blend) + perp.y * blend;
      }
    }

  } else {
    // === WANDER MODE - pick safe waypoint with path validation ===
    bot.wanderTimer -= TICK_RATE;
    if (bot.wanderTimer <= 0) {
      bot.wanderTimer = AI_WANDER_CHANGE + Math.random() * 2000;
      const wp = pickSafeWaypoint(me.x, me.y, ghostIds);
      bot.targetX = wp.x;
      bot.targetY = wp.y;
    }

    const dx = bot.targetX - me.x;
    const dy = bot.targetY - me.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 15) {
      desiredX = dx / dist;
      desiredY = dy / dist;
    } else {
      bot.wanderTimer = 0;
      desiredX = bot.dir.x || (Math.random() - 0.5);
      desiredY = bot.dir.y || (Math.random() - 0.5);
    }

    // Forward ray-cast while wandering
    const wAngle = Math.atan2(desiredY, desiredX);
    const wFwd = rayDir(me.x, me.y, wAngle, AI_RAY_LENGTH);
    if (wFwd < 30) {
      const perp = bestPerpDir(me.x, me.y, wAngle);
      const blend = Math.max(0, 1 - wFwd / 30);
      desiredX = desiredX * (1 - blend * 0.7) + perp.x * blend * 0.7;
      desiredY = desiredY * (1 - blend * 0.7) + perp.y * blend * 0.7;
    }
  }

  // General wall avoidance
  const avoid = wallAvoidance(me.x, me.y, desiredX, desiredY);
  desiredX += avoid.x * 3.0;
  desiredY += avoid.y * 3.0;

  const len = Math.hypot(desiredX, desiredY);
  if (len > 0) { bot.dir = {x: desiredX/len, y: desiredY/len}; }
}

// Pick a safe waypoint considering openness, path clearance, and ghost distance
function pickSafeWaypoint(curX, curY, ghostIds) {
  let bestX = curX, bestY = curY, bestScore = -Infinity;

  for (let attempt = 0; attempt < 15; attempt++) {
    const tx = 40 + Math.random() * (ARENA_W - 80);
    const ty = 40 + Math.random() * (ARENA_H - 80);
    const distFromCur = Math.hypot(tx - curX, ty - curY);
    if (distFromCur < 50 || distFromCur > 400) continue;

    const open = opennessScore(tx, ty);
    if (open < 22) continue; // too close to walls

    // Path must be clear
    if (!isPathClear(curX, curY, tx, ty)) continue;

    // Bonus for distance from ghosts
    let ghostBonus = 0;
    if (ghostIds) {
      ghostIds.forEach(gid => {
        const g = players[gid];
        if (g && g.alive) {
          const gd = Math.hypot(tx - g.x, ty - g.y);
          ghostBonus += Math.min(gd, 350) * 0.25;
        }
      });
    }

    const score = open * 1.5 + ghostBonus - distFromCur * 0.08;
    if (score > bestScore) {
      bestScore = score;
      bestX = tx;
      bestY = ty;
    }
  }

  // Fallback: if no good waypoint found, pick the most open nearby direction
  if (bestScore === -Infinity) {
    let bestAngle = Math.random() * Math.PI * 2;
    let bestOpen = 0;
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 8) {
      const rd = rayDir(curX, curY, a, 100);
      if (rd > bestOpen) { bestOpen = rd; bestAngle = a; }
    }
    bestX = curX + Math.cos(bestAngle) * 60;
    bestY = curY + Math.sin(bestAngle) * 60;
  }

  return {x: bestX, y: bestY};
}

function wallAvoidance(x, y, dirX, dirY) {
  let ax = 0, ay = 0;
  const lookAhead = 55;

  for (const w of WALLS) {
    const cx = Math.max(w.x, Math.min(x, w.x + w.w));
    const cy = Math.max(w.y, Math.min(y, w.y + w.h));
    const dx = x - cx;
    const dy = y - cy;
    const dist = Math.hypot(dx, dy);
    if (dist < lookAhead && dist > 0) {
      const strength = ((lookAhead - dist) / lookAhead);
      ax += (dx / dist) * strength * strength;
      ay += (dy / dist) * strength * strength;
    } else if (dist === 0) {
      ax += -dirY;
      ay += dirX;
    }
  }

  const margin = 40;
  if (x < margin) ax += ((margin - x) / margin) * 1.5;
  if (x > ARENA_W - margin) ax -= ((x - (ARENA_W - margin)) / margin) * 1.5;
  if (y < margin) ay += ((margin - y) / margin) * 1.5;
  if (y > ARENA_H - margin) ay -= ((y - (ARENA_H - margin)) / margin) * 1.5;

  return {x: ax, y: ay};
}

// ============ ITEMS & SKILLS ============
function spawnItem() {
  if (mapItems.length >= MAX_ITEMS_ON_MAP) return;
  const type = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
  let x, y, ok = false;
  for (let t = 0; t < 30; t++) {
    x = 50 + Math.random() * (ARENA_W - 100);
    y = 50 + Math.random() * (ARENA_H - 100);
    if (!collidesWall(x, y, 18)) { ok = true; break; }
  }
  if (!ok) return;
  mapItems.push({x, y, type, spawnTime: Date.now(), id: Math.random().toString(36).slice(2)});
}

function checkItemPickup(playerId) {
  const p = players[playerId];
  if (!p || !p.alive) return;
  for (let i = mapItems.length - 1; i >= 0; i--) {
    const item = mapItems[i];
    if (Math.hypot(p.x - item.x, p.y - item.y) < PLAYER_R + 16) {
      mapItems.splice(i, 1);
      applyItemEffect(playerId, item.type);
      if (playerId === myId) {
        showItemNotify(item.type);
        for (let j = 0; j < 8; j++) spawnParticle(item.x, item.y, item.type.color, 500, (Math.random()-.5)*3, (Math.random()-.5)*3, 4);
      }
      return;
    }
  }
}

function applyItemEffect(playerId, type) {
  if (!playerEffects[playerId]) playerEffects[playerId] = {};
  const eff = playerEffects[playerId];
  switch (type.id) {
    case 'speed': eff.speedEnd = Date.now() + type.duration; break;
    case 'shield': eff.shieldEnd = Date.now() + type.duration; break;
    case 'invisible': eff.invisibleEnd = Date.now() + type.duration; break;
    case 'freeze':
      const me = players[playerId];
      if (!me) return;
      Object.values(players).forEach(p => {
        if (p.isGhost && p.alive && Math.hypot(p.x - me.x, p.y - me.y) < 180) {
          if (!playerEffects[p.id]) playerEffects[p.id] = {};
          playerEffects[p.id].frozenEnd = Date.now() + 3000;
          for (let j = 0; j < 6; j++) spawnParticle(p.x, p.y, '#00d2d3', 600, (Math.random()-.5)*2, (Math.random()-.5)*2, 3);
        }
      });
      break;
  }
}

function hasEffect(pid, effName) {
  const eff = playerEffects[pid];
  if (!eff) return false;
  const now = Date.now();
  switch (effName) {
    case 'speed': return eff.speedEnd && now < eff.speedEnd;
    case 'shield': return eff.shieldEnd && now < eff.shieldEnd;
    case 'invisible': return eff.invisibleEnd && now < eff.invisibleEnd;
    case 'frozen': return eff.frozenEnd && now < eff.frozenEnd;
  }
  return false;
}

function getSpeedMult(pid) {
  return hasEffect(pid, 'speed') ? 1.6 : 1.0;
}

function showItemNotify(type) {
  const el = document.getElementById('item-notify');
  el.textContent = type.emoji + ' ' + type.name + '!';
  el.style.color = type.color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

function updateEffectsBar() {
  const bar = document.getElementById('effects-bar');
  if (!bar) return;
  const eff = playerEffects[myId];
  const now = Date.now();
  let html = '';
  if (eff) {
    if (eff.speedEnd && now < eff.speedEnd) {
      const s = Math.ceil((eff.speedEnd - now) / 1000);
      html += `<div class="effect-icon" style="background:rgba(77,150,255,.2);color:#4d96ff;border:1px solid rgba(77,150,255,.3)">⚡ ${s}s</div>`;
    }
    if (eff.shieldEnd && now < eff.shieldEnd) {
      const s = Math.ceil((eff.shieldEnd - now) / 1000);
      html += `<div class="effect-icon" style="background:rgba(255,217,61,.2);color:#ffd93d;border:1px solid rgba(255,217,61,.3)">🛡️ ${s}s</div>`;
    }
    if (eff.invisibleEnd && now < eff.invisibleEnd) {
      const s = Math.ceil((eff.invisibleEnd - now) / 1000);
      html += `<div class="effect-icon" style="background:rgba(166,108,255,.2);color:#a66cff;border:1px solid rgba(166,108,255,.3)">👁️ ${s}s</div>`;
    }
  }
  bar.innerHTML = html;
}

function updateSkillBtn() {
  const btn = document.getElementById('skill-btn');
  const cd = document.getElementById('skill-cd');
  if (!btn || !cd) return;
  const now = Date.now();
  if (now < dashCooldown) {
    btn.classList.add('cooldown');
    cd.textContent = Math.ceil((dashCooldown - now) / 1000) + 's';
  } else {
    btn.classList.remove('cooldown');
    cd.textContent = '';
  }
}

function activateDash(e) {
  e.preventDefault();
  e.stopPropagation();
  if (dashTimer > 0 || Date.now() < dashCooldown || !gameRunning) return;
  const me = players[myId];
  if (!me || !me.alive) return;
  let dx = me.dir.x, dy = me.dir.y;
  if (dx === 0 && dy === 0) {
    const a = Math.random() * Math.PI * 2;
    dx = Math.cos(a); dy = Math.sin(a);
  }
  const len = Math.hypot(dx, dy);
  if (len > 0) { dx /= len; dy /= len; }
  dashTimer = DASH_DURATION;
  dashCooldown = Date.now() + DASH_CD;
  me._dashDx = dx;
  me._dashDy = dy;
  for (let i = 0; i < 10; i++) {
    spawnParticle(me.x, me.y, '#4d96ff', 400, -dx*2+(Math.random()-.5), -dy*2+(Math.random()-.5), 3+Math.random()*2);
  }
}

// ============ SINGLE PLAYER END ============
function finishSinglePlayer() {
  clearInterval(spTickInterval);
  clearInterval(spTimerInterval);
  spTickInterval = null;
  spTimerInterval = null;
  gameRunning = false;

  const ids = Object.keys(players);
  const runnersLeft = ids.filter(id => !players[id].isGhost && players[id].alive);
  const allCaught = runnersLeft.length === 0;

  // Determine result
  const me = players[myId];
  let title, sub;

  if (spRole === 'ghost') {
    // Player is ghost
    if (allCaught) {
      title = '胜利!';
      sub = '你在时间内抓住了所有人!';
    } else {
      title = '失败!';
      sub = `时间到! 还有 ${runnersLeft.length} 人没被抓住`;
    }
  } else {
    // Player is runner
    if (me && !me.isGhost) {
      title = '胜利!';
      sub = '你成功存活到了最后!';
    } else {
      title = '被抓住了!';
      sub = '你变成了鬼...';
    }
  }

  // Calculate scores
  const results = Object.values(players).map(p => ({
    name: p.name,
    score: p.score + (!p.isGhost ? Math.floor(gameTime) * 2 : 0),
    survived: !p.isGhost
  })).sort((a,b) => b.score - a.score);

  // Show result
  const el = document.getElementById('result');
  const titleEl = document.getElementById('result-title');
  const subEl = document.getElementById('result-sub');

  if (title === '胜利!') {
    titleEl.style.background = 'linear-gradient(90deg,#ffd93d,#6bcb77)';
  } else {
    titleEl.style.background = 'linear-gradient(90deg,#ff6b6b,#ee5a24)';
  }
  titleEl.textContent = title;
  titleEl.style.webkitBackgroundClip = 'text';
  titleEl.style.webkitTextFillColor = 'transparent';
  subEl.textContent = sub;

  const scoresEl = document.getElementById('result-scores');
  scoresEl.innerHTML = '';
  results.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `<span class="result-rank">${i===0?'👑':''} #${i+1} ${r.name} ${r.survived?'🏃':'👻'}</span><span class="result-score">${r.score}分</span>`;
    scoresEl.appendChild(row);
  });
  el.classList.add('active');
}

function playAgainSinglePlayer() {
  document.getElementById('result').classList.remove('active');
  if (isSinglePlayer) {
    startSinglePlayer(spRole);
  } else if (isHost) {
    startGame();
  }
}

function backToLobbySinglePlayer() {
  document.getElementById('result').classList.remove('active');
  isSinglePlayer = false;
  bots = [];
  gameRunning = false;
  showScreen('lobby');
  showMain();
}

// ============ HOST MESSAGE HANDLING ============
function handleHostMessage(conn, data) {
  if (data.type === 'join') {
    const colorIdx = Object.keys(players).length % COLORS.length;
    const spawnPos = getSpawnPos();
    players[conn.peer] = {
      id: conn.peer, name: data.name, color: colorIdx,
      x: spawnPos.x, y: spawnPos.y, isGhost: false,
      dir: {x:0,y:0}, score: 0, alive: true
    };
    conn.metadata = {peerId: conn.peer, name: data.name};
    // Send current state
    conn.send({type:'state', players, walls: WALLS, arenaW: ARENA_W, arenaH: ARENA_H});
    updatePlayersList();
    broadcast({type:'players_update', players});
  } else if (data.type === 'input') {
    if (players[conn.peer]) {
      players[conn.peer].dir = data.dir;
    }
  }
}

function handleClientMessage(data) {
  if (data.type === 'state') {
    players = data.players;
    myColor = players[myId]?.color || 0;
  } else if (data.type === 'tick') {
    // Update all players from host
    for (const id in data.players) {
      if (players[id]) {
        players[id].x = data.players[id].x;
        players[id].y = data.players[id].y;
        players[id].isGhost = data.players[id].isGhost;
        players[id].alive = data.players[id].alive;
      } else {
        players[id] = data.players[id];
      }
    }
    gameTime = data.time;
    updateHUD();
  } else if (data.type === 'game_start') {
    beginGame();
  } else if (data.type === 'game_end') {
    endGame(data.results);
  } else if (data.type === 'players_update') {
    // Update player list in lobby
    const oldIds = Object.keys(players);
    players = data.players;
    // Keep my entry
    if (!players[myId] && oldIds.includes(myId)) {
      // I was removed
    }
  }
}

// ============ BROADCAST ============
function broadcast(data) {
  connections.forEach(c => { if (c.open) c.send(data); });
}

// ============ SPAWN POSITIONS ============
function getSpawnPos() {
  const positions = [
    {x:120,y:110},{x:870,y:110},{x:120,y:580},{x:870,y:580},
    {x:500,y:350},{x:300,y:350},{x:700,y:350},{x:500,y:150},
    {x:350,y:550},{x:650,y:550}
  ];
  const used = Object.values(players).map(p => ({x:p.x, y:p.y}));
  for (const pos of positions) {
    if (!used.some(u => Math.hypot(u.x-pos.x, u.y-pos.y) < 60)) return pos;
  }
  return positions[Math.floor(Math.random() * positions.length)];
}

// ============ START GAME ============
function startGame() {
  if (Object.keys(players).length < 2) { alert('至少需要2位玩家'); return; }
  // Pick first ghost randomly
  const ids = Object.keys(players);
  const ghostIdx = Math.floor(Math.random() * ids.length);
  ids.forEach((id, i) => {
    const pos = getSpawnPos();
    players[id].x = pos.x;
    players[id].y = pos.y;
    players[id].isGhost = (i === ghostIdx);
    players[id].alive = true;
    players[id].score = 0;
    players[id].dir = {x:0, y:0};
  });
  gameTime = ROUND_TIME;
  mapItems = [];
  playerEffects = {};
  lastItemSpawn = Date.now() - ITEM_SPAWN_INTERVAL + 3000;
  dashCooldown = 0;
  dashTimer = 0;
  broadcast({type:'state', players, walls:WALLS, arenaW:ARENA_W, arenaH:ARENA_H});
  broadcast({type:'game_start'});
  beginGame();
}

function beginGame() {
  gameRunning = true;
  showScreen('game-screen');
  initCanvas();
  // Countdown
  showCountdown(3, () => {
    // Start game loop
    if (isHost) {
      tickInterval = setInterval(hostTick, TICK_RATE);
      gameTimerInterval = setInterval(() => {
        gameTime--;
        if (gameTime <= 0) {
          gameTime = 0;
          finishGame();
        }
      }, 1000);
    }
    updateHUD();
    requestAnimationFrame(gameLoop);
  });
}

function showCountdown(n, cb) {
  const el = document.getElementById('countdown');
  const txt = document.getElementById('countdown-text');
  el.classList.add('active');
  let count = n;
  txt.textContent = count;
  const iv = setInterval(() => {
    count--;
    if (count > 0) {
      txt.textContent = count;
      txt.style.animation = 'none';
      void txt.offsetWidth;
      txt.style.animation = 'countPop .8s ease';
    } else if (count === 0) {
      txt.textContent = '开始!';
      txt.style.color = '#6bcb77';
      txt.style.animation = 'none';
      void txt.offsetWidth;
      txt.style.animation = 'countPop .8s ease';
    } else {
      clearInterval(iv);
      el.classList.remove('active');
      txt.style.color = '#ffd93d';
      cb();
    }
  }, 1000);
}

// ============ HOST TICK ============
function hostTick() {
  const ids = Object.keys(players);
  // Move players
  ids.forEach(id => {
    const p = players[id];
    if (!p.alive) return;
    if (hasEffect(id, 'frozen')) return;
    // Dash movement
    if (id === myId && dashTimer > 0) {
      const dashSpd = PLAYER_SPEED * DASH_SPEED_MULT;
      const dnx = p.x + (p._dashDx||0) * dashSpd;
      const dny = p.y + (p._dashDy||0) * dashSpd;
      if (!collidesWall(dnx, p.y, PLAYER_R)) p.x = dnx;
      if (!collidesWall(p.x, dny, PLAYER_R)) p.y = dny;
      dashTimer -= TICK_RATE;
      if (dashTimer <= 0) dashTimer = 0;
    } else {
      const mult = getSpeedMult(id);
      const speed = (p.isGhost ? GHOST_SPEED : PLAYER_SPEED) * mult;
      let nx = p.x + p.dir.x * speed;
      let ny = p.y + p.dir.y * speed;
      if (!collidesWall(nx, p.y, PLAYER_R)) p.x = nx;
      if (!collidesWall(p.x, ny, PLAYER_R)) p.y = ny;
    }
    p.x = Math.max(PLAYER_R, Math.min(ARENA_W - PLAYER_R, p.x));
    p.y = Math.max(PLAYER_R, Math.min(ARENA_H - PLAYER_R, p.y));
  });
  // Tag detection (with shield/invisible)
  const ghosts = ids.filter(id => players[id].isGhost && players[id].alive);
  const runners = ids.filter(id => !players[id].isGhost && players[id].alive);
  ghosts.forEach(gid => {
    runners.forEach(rid => {
      const g = players[gid], r = players[rid];
      if (Math.hypot(g.x - r.x, g.y - r.y) < TAG_DIST) {
        if (hasEffect(rid, 'shield')) {
          playerEffects[rid].shieldEnd = 0;
          g.score = Math.max(0, g.score - 5);
        } else if (!hasEffect(rid, 'invisible')) {
          r.isGhost = true;
          g.score += 10;
        }
      }
    });
  });
  // Item spawning & expiry
  const now = Date.now();
  if (now - lastItemSpawn > ITEM_SPAWN_INTERVAL) { spawnItem(); lastItemSpawn = now; }
  mapItems = mapItems.filter(item => now - item.spawnTime <= ITEM_LIFETIME);
  // Item pickup
  ids.forEach(id => checkItemPickup(id));
  // Check game end
  const currentRunners = ids.filter(id => !players[id].isGhost && players[id].alive);
  if (currentRunners.length <= (ids.length > 2 ? 1 : 0) || currentRunners.length === 0) {
    finishGame();
    return;
  }
  // Broadcast tick
  const tickData = {};
  ids.forEach(id => {
    tickData[id] = {x:players[id].x, y:players[id].y, isGhost:players[id].isGhost, alive:players[id].alive};
  });
  broadcast({type:'tick', players:tickData, time:gameTime});
}

function finishGame() {
  clearInterval(tickInterval);
  clearInterval(gameTimerInterval);
  tickInterval = null;
  gameTimerInterval = null;
  gameRunning = false;
  // Calculate results
  const results = Object.values(players).map(p => ({
    name: p.name,
    score: p.score + (p.isGhost ? 0 : Math.floor(gameTime) * 2), // runners get time bonus
    survived: !p.isGhost
  })).sort((a,b) => b.score - a.score);
  broadcast({type:'game_end', results});
  endGame(results);
}

function endGame(results) {
  gameRunning = false;
  clearInterval(tickInterval);
  clearInterval(gameTimerInterval);
  const el = document.getElementById('result');
  const myResult = results.find(r => r.name === myName);
  const title = document.getElementById('result-title');
  const sub = document.getElementById('result-sub');
  if (myResult && myResult.survived) {
    title.textContent = '胜利!';
    title.style.background = 'linear-gradient(90deg,#ffd93d,#6bcb77)';
  } else {
    title.textContent = '被抓住了!';
    title.style.background = 'linear-gradient(90deg,#ff6b6b,#ee5a24)';
  }
  title.style.webkitBackgroundClip = 'text';
  title.style.webkitTextFillColor = 'transparent';
  sub.textContent = myResult ? `你的得分: ${myResult.score}` : '';
  const scoresEl = document.getElementById('result-scores');
  scoresEl.innerHTML = '';
  results.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `<span class="result-rank">${i===0?'👑':''} #${i+1} ${r.name} ${r.survived?'🏃':'👻'}</span><span class="result-score">${r.score}分</span>`;
    scoresEl.appendChild(row);
  });
  el.classList.add('active');
}

function playAgain() {
  document.getElementById('result').classList.remove('active');
  if (isSinglePlayer) {
    startSinglePlayer(spRole);
  } else if (isHost) {
    startGame();
  }
}

function backToLobby() {
  document.getElementById('result').classList.remove('active');
  if (isSinglePlayer) {
    isSinglePlayer = false;
    bots = [];
    showScreen('lobby');
    showMain();
  } else {
    showScreen('lobby');
    showWaiting();
    if (isHost) updatePlayersList();
  }
}

// ============ CANVAS ============
function initCanvas() {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  const hud = document.getElementById('game-hud');
  const hudH = hud.offsetHeight;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - hudH;
  canvas.style.marginTop = hudH + 'px';
  const scaleX = canvas.width / ARENA_W;
  const scaleY = canvas.height / ARENA_H;
  canvasScale = Math.min(scaleX, scaleY) * 0.95;
  canvasOffX = (canvas.width - ARENA_W * canvasScale) / 2;
  canvasOffY = (canvas.height - ARENA_H * canvasScale) / 2;
  floorCanvas = null;
}

function toScreen(x, y) {
  return {x: x * canvasScale + canvasOffX, y: y * canvasScale + canvasOffY};
}

// ============ GAME LOOP (rendering) ============
function gameLoop() {
  if (!canvas) return;
  updateParticles();
  render();
  renderMinimap();
  updateEffectsBar();
  updateSkillBtn();
  if (gameRunning || document.getElementById('game-screen').classList.contains('active')) {
    requestAnimationFrame(gameLoop);
  }
}

// ============ PARTICLES ============
let particles = [];
const MAX_PARTICLES = 120;

function spawnParticle(x, y, color, life, vx, vy, size) {
  if (particles.length >= MAX_PARTICLES) particles.shift();
  particles.push({x, y, color, life, maxLife:life, vx:vx||0, vy:vy||0, size:size||3});
}

function updateParticles() {
  // Dash trail particles
  if (dashTimer > 0 && players[myId]) {
    const me = players[myId];
    for (let i = 0; i < 2; i++) {
      spawnParticle(me.x + (Math.random()-.5)*10, me.y + (Math.random()-.5)*10,
        'rgba(77,150,255,', 300, (Math.random()-.5)*1.5, (Math.random()-.5)*1.5, 2+Math.random()*3);
    }
  }
  // Spawn trail particles for moving players
  const ids = Object.keys(players);
  ids.forEach(id => {
    const p = players[id];
    if (!p.alive || (p.dir.x === 0 && p.dir.y === 0)) return;
    if (Math.random() < 0.3) {
      const c = p.isGhost ? 'rgba(255,80,80,' : `rgba(${hexToRgb(COLORS[p.color]||COLORS[0])},`;
      spawnParticle(p.x + (Math.random()-0.5)*8, p.y + (Math.random()-0.5)*8,
        c, 400 + Math.random()*300,
        -p.dir.x * 0.3 + (Math.random()-0.5)*0.5,
        -p.dir.y * 0.3 + (Math.random()-0.5)*0.5,
        2 + Math.random()*3);
    }
  });
  // Update existing
  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.life -= 16;
    if (pt.life <= 0) { particles.splice(i, 1); continue; }
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vx *= 0.96;
    pt.vy *= 0.96;
  }
}

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return `${(n>>16)&0xff},${(n>>8)&0xff},${n&0xff}`;
}

// ============ RENDER ============
let frameCount = 0;

function render() {
  frameCount++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#080b10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const tl = toScreen(0, 0);
  const br = toScreen(ARENA_W, ARENA_H);
  const aw = br.x - tl.x, ah = br.y - tl.y;

  // Stone tile floor
  drawFloor();

  // Ambient firefly particles
  ambientPx.forEach(ap => {
    ap.x += ap.vx; ap.y += ap.vy;
    if (ap.x < 0 || ap.x > ARENA_W) ap.vx *= -1;
    if (ap.y < 0 || ap.y > ARENA_H) ap.vy *= -1;
    const glow = 0.15 + Math.sin(frameCount * 0.02 + ap.phase) * 0.12;
    const as = toScreen(ap.x, ap.y);
    ctx.fillStyle = `rgba(${ap.hue},${glow})`;
    ctx.beginPath(); ctx.arc(as.x, as.y, ap.size * canvasScale, 0, Math.PI * 2); ctx.fill();
    const ag = ctx.createRadialGradient(as.x, as.y, 0, as.x, as.y, ap.size * 4 * canvasScale);
    ag.addColorStop(0, `rgba(${ap.hue},${glow * 0.3})`);
    ag.addColorStop(1, 'transparent');
    ctx.fillStyle = ag;
    ctx.beginPath(); ctx.arc(as.x, as.y, ap.size * 4 * canvasScale, 0, Math.PI * 2); ctx.fill();
  });

  // Particles (behind walls)
  particles.forEach(pt => {
    const s = toScreen(pt.x, pt.y);
    const alpha = (pt.life / pt.maxLife) * 0.6;
    const sz = pt.size * canvasScale * (pt.life / pt.maxLife);
    ctx.fillStyle = pt.color + alpha + ')';
    ctx.beginPath();
    ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
    ctx.fill();
  });

  // Walls - glowing moss ancient ruins style
  WALLS.forEach(w => {
    const s = toScreen(w.x, w.y);
    const rw = w.w * canvasScale, rh = w.h * canvasScale;
    const rad = Math.min(4, rw / 3, rh / 3);

    // Deep shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.roundRect(s.x + 2, s.y + 2, rw, rh, rad); ctx.fill();

    // Stone body
    const wg = ctx.createLinearGradient(s.x, s.y, s.x + rw, s.y + rh);
    wg.addColorStop(0, '#2a3038');
    wg.addColorStop(0.5, '#353d48');
    wg.addColorStop(1, '#282e36');
    ctx.fillStyle = wg;
    ctx.beginPath(); ctx.roundRect(s.x, s.y, rw, rh, rad); ctx.fill();

    // Green moss glow
    ctx.shadowColor = 'rgba(80,200,120,0.35)';
    ctx.shadowBlur = 8 * canvasScale;
    ctx.strokeStyle = 'rgba(80,200,120,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(s.x, s.y, rw, rh, rad); ctx.stroke();
    ctx.shadowBlur = 0;

    // Top edge highlight
    ctx.strokeStyle = 'rgba(160,220,160,0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(s.x + rad, s.y + 1); ctx.lineTo(s.x + rw - rad, s.y + 1); ctx.stroke();
  });

  // Torch decorations at corners
  const torches = [{x:30,y:30},{x:ARENA_W-30,y:30},{x:30,y:ARENA_H-30},{x:ARENA_W-30,y:ARENA_H-30}];
  torches.forEach(tp => {
    const ts = toScreen(tp.x, tp.y);
    const flicker = 0.6 + Math.sin(frameCount * 0.08 + tp.x) * 0.15 + Math.sin(frameCount * 0.13 + tp.y) * 0.1;
    const tr = 55 * canvasScale * flicker;
    const tg = ctx.createRadialGradient(ts.x, ts.y, 0, ts.x, ts.y, tr);
    tg.addColorStop(0, `rgba(255,180,80,${0.18 * flicker})`);
    tg.addColorStop(0.5, `rgba(255,120,40,${0.06 * flicker})`);
    tg.addColorStop(1, 'transparent');
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.arc(ts.x, ts.y, tr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(255,200,100,${0.7 * flicker})`;
    ctx.beginPath(); ctx.arc(ts.x, ts.y, 3 * canvasScale, 0, Math.PI * 2); ctx.fill();
  });

  // Center rune circle decoration
  const center = toScreen(ARENA_W / 2, ARENA_H / 2);
  const runeR = 40 * canvasScale;
  ctx.strokeStyle = `rgba(80,200,120,${0.06 + Math.sin(frameCount * 0.015) * 0.03})`;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(center.x, center.y, runeR, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(center.x, center.y, runeR * 0.6, 0, Math.PI * 2); ctx.stroke();

  // Items on map
  const now = Date.now();
  mapItems.forEach(item => {
    const s = toScreen(item.x, item.y);
    const ir = 14 * canvasScale;
    const age = now - item.spawnTime;
    const fadeOut = age > ITEM_LIFETIME - 3000 ? (ITEM_LIFETIME - age) / 3000 : 1;
    const pulse = 0.8 + Math.sin(now * 0.005 + item.x) * 0.2;

    // Glow
    ctx.globalAlpha = fadeOut * 0.35 * pulse;
    const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, ir * 2.5);
    glow.addColorStop(0, item.type.color);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(s.x, s.y, ir * 2.5, 0, Math.PI * 2); ctx.fill();

    // Circle
    ctx.globalAlpha = fadeOut * 0.85;
    ctx.fillStyle = item.type.color;
    ctx.beginPath(); ctx.arc(s.x, s.y, ir * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Emoji
    ctx.globalAlpha = fadeOut;
    ctx.font = `${Math.floor(ir * 1.1)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(item.type.emoji, s.x, s.y);
    ctx.globalAlpha = 1;
  });

  // Arena border with moss energy glow
  ctx.shadowColor = 'rgba(80,200,120,0.4)';
  ctx.shadowBlur = 10;
  ctx.strokeStyle = 'rgba(80,200,120,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(tl.x, tl.y, aw, ah, 8); ctx.stroke();
  ctx.shadowBlur = 0;

  // Players
  const ids = Object.keys(players);
  const runners = ids.filter(id => !players[id].isGhost);
  const ghosts = ids.filter(id => players[id].isGhost);
  runners.forEach(id => drawPlayer(players[id], false));
  ghosts.forEach(id => drawPlayer(players[id], true));
}

function drawPlayer(p, isGhost) {
  const s = toScreen(p.x, p.y);
  const r = PLAYER_R * canvasScale;
  const color = COLORS[p.color] || COLORS[0];
  const t = frameCount * 0.05;

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(s.x + 1, s.y + r * 0.9, r * 0.7, r * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  if (isGhost) {
    const ghostType = (p.color || 0) % 4;

    // === GHOST AURA (pulsing glow) ===
    const pulse = 0.85 + Math.sin(t * 2.5) * 0.15;
    const auraR = r * 2.8 * pulse;
    const aura = ctx.createRadialGradient(s.x, s.y - r * 0.15, r * 0.2, s.x, s.y, auraR);
    aura.addColorStop(0, 'rgba(255,70,70,0.18)');
    aura.addColorStop(0.4, 'rgba(255,50,50,0.07)');
    aura.addColorStop(1, 'rgba(255,30,30,0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(s.x, s.y, auraR, 0, Math.PI * 2); ctx.fill();

    // === GHOST BODY (dome top + wavy bottom) ===
    const bob = Math.sin(t * 3) * r * 0.06;
    const bodyTop = s.y - r * 1.05 + bob;
    const bodyBot = s.y + r * 0.95 + bob;
    const bodyW = r * 1.05;

    // Ghost body gradient
    const gg = ctx.createLinearGradient(s.x, bodyTop, s.x, bodyBot);
    gg.addColorStop(0, 'rgba(255,220,220,0.95)');
    gg.addColorStop(0.35, 'rgba(255,120,120,0.88)');
    gg.addColorStop(0.7, 'rgba(230,60,60,0.82)');
    gg.addColorStop(1, 'rgba(180,30,30,0.5)');
    ctx.fillStyle = gg;

    ctx.beginPath();
    ctx.moveTo(s.x - bodyW, bodyBot);
    // Left side up
    ctx.quadraticCurveTo(s.x - bodyW * 1.05, s.y - r * 0.2 + bob, s.x - bodyW * 0.6, bodyTop + r * 0.3);
    // Dome top
    ctx.quadraticCurveTo(s.x, bodyTop - r * 0.25, s.x + bodyW * 0.6, bodyTop + r * 0.3);
    // Right side down
    ctx.quadraticCurveTo(s.x + bodyW * 1.05, s.y - r * 0.2 + bob, s.x + bodyW, bodyBot);
    // Wavy bottom (3 bumps)
    const wavePhase = t * 4;
    for (let i = 0; i < 3; i++) {
      const x1 = s.x + bodyW - (i * 2 + 1) * bodyW / 3;
      const x2 = s.x + bodyW - (i * 2 + 2) * bodyW / 3;
      const waveY = Math.sin(wavePhase + i * 1.8) * r * 0.12;
      ctx.quadraticCurveTo(
        (x1 + x2) / 2, bodyBot + r * 0.22 + waveY,
        x2, bodyBot
      );
    }
    ctx.closePath();
    ctx.fill();

    // Ghost body outline
    ctx.strokeStyle = 'rgba(255,130,130,0.35)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.ellipse(s.x - r * 0.15, s.y - r * 0.35 + bob, r * 0.3, r * 0.18, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // === GHOST EYES ===
    const eyeY = s.y - r * 0.15 + bob;
    const eyeSpacing = r * 0.32;
    const eyeW = r * 0.22;
    const eyeH = r * 0.3;

    // Eye whites (glowing)
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = r * 0.4;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(s.x - eyeSpacing, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s.x + eyeSpacing, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // Pupils with colored glowing irises (varies by ghost type)
    const pdx = (p.dir.x || 0) * r * 0.06;
    const pdy = (p.dir.y || 0) * r * 0.06;
    const ghostEyeColors = ['#ff0040','#c040ff','#ff8c00','#40ff80'];
    const gEyeCol = ghostEyeColors[ghostType];
    ctx.shadowColor = gEyeCol;
    ctx.shadowBlur = r * 0.25;
    ctx.fillStyle = gEyeCol;
    ctx.beginPath(); ctx.arc(s.x - eyeSpacing + pdx * 0.5, eyeY + pdy * 0.5, r * 0.13, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x + eyeSpacing + pdx * 0.5, eyeY + pdy * 0.5, r * 0.13, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#1a0000';
    ctx.beginPath(); ctx.arc(s.x - eyeSpacing + pdx, eyeY + pdy, r * 0.07, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x + eyeSpacing + pdx, eyeY + pdy, r * 0.07, 0, Math.PI * 2); ctx.fill();

    // === GHOST MOUTH (varies by type) ===
    const mouthY = eyeY + r * 0.38;
    ctx.strokeStyle = 'rgba(100,0,0,0.6)';
    ctx.lineWidth = 1.5;
    if (ghostType === 0) { // evil grin
      ctx.beginPath(); ctx.arc(s.x, mouthY - r * 0.05, r * 0.2, 0.15, Math.PI - 0.15); ctx.stroke();
      ctx.fillStyle = 'rgba(60,0,0,0.4)'; ctx.beginPath(); ctx.arc(s.x, mouthY - r * 0.05, r * 0.18, 0.2, Math.PI - 0.2); ctx.fill();
    } else if (ghostType === 1) { // surprised O
      ctx.fillStyle = 'rgba(60,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(s.x, mouthY, r * 0.1, r * 0.13, 0, 0, Math.PI * 2); ctx.fill();
    } else if (ghostType === 2) { // angry frown
      ctx.beginPath(); ctx.arc(s.x, mouthY + r * 0.1, r * 0.15, Math.PI + 0.3, -0.3); ctx.stroke();
    } else { // wide smirk
      ctx.beginPath(); ctx.arc(s.x, mouthY - r * 0.02, r * 0.25, 0.1, Math.PI - 0.1); ctx.stroke();
      ctx.fillStyle = 'rgba(60,0,0,0.3)'; ctx.beginPath(); ctx.arc(s.x, mouthY - r * 0.02, r * 0.22, 0.15, Math.PI - 0.15); ctx.fill();
    }

    // Ghost type decorations
    if (ghostType === 1) { // small horn bumps
      ctx.fillStyle = 'rgba(255,120,120,0.5)';
      ctx.beginPath(); ctx.arc(s.x - r * 0.3, s.y - r * 0.95 + bob, r * 0.1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(s.x + r * 0.3, s.y - r * 0.95 + bob, r * 0.1, 0, Math.PI * 2); ctx.fill();
    } else if (ghostType === 3) { // tiny crown
      ctx.fillStyle = 'rgba(255,217,61,0.5)';
      const crY = s.y - r * 1.0 + bob;
      ctx.beginPath(); ctx.moveTo(s.x - r * 0.2, crY); ctx.lineTo(s.x - r * 0.15, crY - r * 0.15);
      ctx.lineTo(s.x - r * 0.05, crY - r * 0.05); ctx.lineTo(s.x, crY - r * 0.2);
      ctx.lineTo(s.x + r * 0.05, crY - r * 0.05); ctx.lineTo(s.x + r * 0.15, crY - r * 0.15);
      ctx.lineTo(s.x + r * 0.2, crY); ctx.closePath(); ctx.fill();
    }

  } else {
    // === HUMAN CHARACTER ===
    const isMoving = (p.dir.x !== 0 || p.dir.y !== 0);
    const walkPhase = isMoving ? frameCount * 0.18 : 0;
    const legSwing = isMoving ? Math.sin(walkPhase) * r * 0.3 : 0;
    const armSwing = isMoving ? Math.sin(walkPhase) * r * 0.2 : 0;
    const bodyBob = isMoving ? Math.abs(Math.sin(walkPhase)) * r * 0.04 : 0;

    // Subtle aura
    const hAura = ctx.createRadialGradient(s.x, s.y, r * 0.3, s.x, s.y, r * 1.6);
    hAura.addColorStop(0, `rgba(${hexToRgb(color)},0.06)`);
    hAura.addColorStop(1, `rgba(${hexToRgb(color)},0)`);
    ctx.fillStyle = hAura;
    ctx.beginPath(); ctx.arc(s.x, s.y, r * 1.6, 0, Math.PI * 2); ctx.fill();

    const bodyY = s.y - bodyBob;

    // === LEGS ===
    ctx.strokeStyle = '#555';
    ctx.lineWidth = Math.max(2, r * 0.16);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(s.x - r * 0.18, bodyY + r * 0.35);
    ctx.lineTo(s.x - r * 0.22, bodyY + r * 0.85 + legSwing);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s.x + r * 0.18, bodyY + r * 0.35);
    ctx.lineTo(s.x + r * 0.22, bodyY + r * 0.85 - legSwing);
    ctx.stroke();

    // Shoes
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.ellipse(s.x - r * 0.22, bodyY + r * 0.88 + legSwing, r * 0.12, r * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s.x + r * 0.22, bodyY + r * 0.88 - legSwing, r * 0.12, r * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();

    // === BODY / TORSO ===
    const torsoGrad = ctx.createLinearGradient(s.x, bodyY - r * 0.35, s.x, bodyY + r * 0.4);
    torsoGrad.addColorStop(0, lightenColor(color, 25));
    torsoGrad.addColorStop(1, color);
    ctx.fillStyle = torsoGrad;
    ctx.beginPath();
    ctx.moveTo(s.x - r * 0.35, bodyY - r * 0.25);
    ctx.lineTo(s.x + r * 0.35, bodyY - r * 0.25);
    ctx.quadraticCurveTo(s.x + r * 0.38, bodyY + r * 0.05, s.x + r * 0.28, bodyY + r * 0.4);
    ctx.lineTo(s.x - r * 0.28, bodyY + r * 0.4);
    ctx.quadraticCurveTo(s.x - r * 0.38, bodyY + r * 0.05, s.x - r * 0.35, bodyY - r * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = `rgba(${hexToRgb(color)},0.5)`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // === ARMS ===
    ctx.strokeStyle = lightenColor(color, -15);
    ctx.lineWidth = Math.max(2, r * 0.14);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(s.x - r * 0.38, bodyY - r * 0.15);
    ctx.lineTo(s.x - r * 0.52, bodyY + r * 0.2 - armSwing);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s.x + r * 0.38, bodyY - r * 0.15);
    ctx.lineTo(s.x + r * 0.52, bodyY + r * 0.2 + armSwing);
    ctx.stroke();

    // Hands
    ctx.fillStyle = '#f5d0a9';
    ctx.beginPath(); ctx.arc(s.x - r * 0.52, bodyY + r * 0.22 - armSwing, r * 0.07, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x + r * 0.52, bodyY + r * 0.22 + armSwing, r * 0.07, 0, Math.PI * 2); ctx.fill();

    // === HEAD ===
    const headR = r * 0.38;
    const headY = bodyY - r * 0.55;

    // Head circle - skin tone varies by player
    const skinTones = ['#ffe4c4','#f5d0a9','#e8c39e','#d4a574','#c68e5e'];
    const skinIdx = (p.color || 0) % skinTones.length;
    const skinBase = skinTones[skinIdx];
    // Darken skin for gradient stop 1
    const skinDark = ['#e8c8a8','#dbb48e','#cfa882','#b88a58','#a87648'][skinIdx];
    const headGrad = ctx.createRadialGradient(s.x - headR * 0.2, headY - headR * 0.2, headR * 0.1, s.x, headY, headR);
    headGrad.addColorStop(0, skinBase);
    headGrad.addColorStop(1, skinDark);
    ctx.fillStyle = headGrad;
    ctx.beginPath(); ctx.arc(s.x, headY, headR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = `rgba(180,140,100,0.35)`;
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Hair style & color variations based on player color
    const hairStyle = (p.color || 0) % 5;
    const hairColors = ['#4a3728','#2a1a0e','#8B4513','#D2691E','#1a1a2e','#5a2d0c','#3d2b1f','#6b3a21'];
    const hairCol = hairColors[(p.color || 0) % hairColors.length];

    // Hair - varied styles per character
    ctx.fillStyle = hairCol;
    if (hairStyle === 0) {
      // Default short hair
      ctx.beginPath();
      ctx.arc(s.x, headY - headR * 0.15, headR * 1.02, Math.PI * 1.15, Math.PI * 1.85);
      ctx.quadraticCurveTo(s.x, headY - headR * 1.15, s.x + headR * 0.85, headY - headR * 0.3);
      ctx.closePath(); ctx.fill();
    } else if (hairStyle === 1) {
      // Long flowing hair
      ctx.beginPath();
      ctx.arc(s.x, headY - headR * 0.1, headR * 1.08, Math.PI * 1.1, Math.PI * 1.9);
      ctx.quadraticCurveTo(s.x, headY - headR * 1.2, s.x + headR * 0.9, headY - headR * 0.2);
      ctx.lineTo(s.x + headR * 0.95, headY + headR * 0.5);
      ctx.quadraticCurveTo(s.x + headR * 0.7, headY + headR * 0.7, s.x + headR * 0.5, headY + headR * 0.3);
      ctx.lineTo(s.x - headR * 0.5, headY + headR * 0.3);
      ctx.quadraticCurveTo(s.x - headR * 0.7, headY + headR * 0.7, s.x - headR * 0.95, headY + headR * 0.5);
      ctx.closePath(); ctx.fill();
    } else if (hairStyle === 2) {
      // Short spiky hair
      ctx.beginPath();
      ctx.moveTo(s.x - headR * 0.8, headY - headR * 0.1);
      ctx.lineTo(s.x - headR * 0.6, headY - headR * 1.1);
      ctx.lineTo(s.x - headR * 0.3, headY - headR * 0.5);
      ctx.lineTo(s.x - headR * 0.1, headY - headR * 1.2);
      ctx.lineTo(s.x + headR * 0.15, headY - headR * 0.5);
      ctx.lineTo(s.x + headR * 0.35, headY - headR * 1.15);
      ctx.lineTo(s.x + headR * 0.6, headY - headR * 0.4);
      ctx.lineTo(s.x + headR * 0.8, headY - headR * 0.9);
      ctx.lineTo(s.x + headR * 0.85, headY - headR * 0.1);
      ctx.closePath(); ctx.fill();
    } else if (hairStyle === 3) {
      // Bun / updo
      ctx.beginPath();
      ctx.arc(s.x, headY - headR * 0.15, headR * 1.02, Math.PI * 1.15, Math.PI * 1.85);
      ctx.quadraticCurveTo(s.x, headY - headR * 1.15, s.x + headR * 0.85, headY - headR * 0.3);
      ctx.closePath(); ctx.fill();
      // Bun on top
      ctx.beginPath();
      ctx.arc(s.x, headY - headR * 1.15, headR * 0.35, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Side-swept bangs
      ctx.beginPath();
      ctx.arc(s.x, headY - headR * 0.15, headR * 1.02, Math.PI * 1.0, Math.PI * 1.85);
      ctx.quadraticCurveTo(s.x + headR * 0.3, headY - headR * 1.1, s.x + headR * 1.0, headY - headR * 0.1);
      ctx.closePath(); ctx.fill();
      // Side fringe
      ctx.beginPath();
      ctx.moveTo(s.x - headR * 0.8, headY - headR * 0.3);
      ctx.quadraticCurveTo(s.x - headR * 0.2, headY - headR * 0.1, s.x + headR * 0.6, headY - headR * 0.4);
      ctx.quadraticCurveTo(s.x, headY - headR * 0.8, s.x - headR * 0.8, headY - headR * 0.3);
      ctx.closePath(); ctx.fill();
    }

    // Eyes
    const hEyeY = headY + headR * 0.05;
    const hEyeSpacing = headR * 0.35;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(s.x - hEyeSpacing, hEyeY, headR * 0.16, headR * 0.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s.x + hEyeSpacing, hEyeY, headR * 0.16, headR * 0.2, 0, 0, Math.PI * 2); ctx.fill();

    // Pupils with colored irises
    const hPdx = (p.dir.x || 0) * headR * 0.08;
    const hPdy = (p.dir.y || 0) * headR * 0.08;
    const eyeColors = ['#3a7bd5','#2e8b57','#8b4513','#6a5acd','#c0392b','#1abc9c','#f39c12','#2c3e50'];
    const eyeCol = eyeColors[(p.color || 0) % eyeColors.length];
    ctx.fillStyle = eyeCol;
    ctx.beginPath(); ctx.arc(s.x - hEyeSpacing + hPdx * 0.5, hEyeY + hPdy * 0.5, headR * 0.12, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x + hEyeSpacing + hPdx * 0.5, hEyeY + hPdy * 0.5, headR * 0.12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(s.x - hEyeSpacing + hPdx, hEyeY + hPdy, headR * 0.06, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x + hEyeSpacing + hPdx, hEyeY + hPdy, headR * 0.06, 0, Math.PI * 2); ctx.fill();
    // Eye highlight
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(s.x - hEyeSpacing + hPdx - headR * 0.03, hEyeY + hPdy - headR * 0.04, headR * 0.03, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(s.x + hEyeSpacing + hPdx - headR * 0.03, hEyeY + hPdy - headR * 0.04, headR * 0.03, 0, Math.PI * 2); ctx.fill();

    // Mouth - color matches skin tone
    const mouthColors = ['#c47a62','#b5705a','#a86650','#946048','#8a5540'];
    ctx.strokeStyle = mouthColors[skinIdx] || '#a0705a';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(s.x, hEyeY + headR * 0.35, headR * 0.15, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }

  // === NAME TAG ===
  const nameFont = Math.max(10, Math.floor(r * 0.6));
  ctx.font = `bold ${nameFont}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const tw = ctx.measureText(p.name).width;
  const tagY = s.y - r * 1.35;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.roundRect(s.x - tw/2 - 5, tagY - nameFont/2 - 2, tw + 10, nameFont + 4, 4); ctx.fill();
  ctx.fillStyle = isGhost ? '#ff9999' : 'rgba(255,255,255,0.9)';
  ctx.fillText(p.name, s.x, tagY);

  // === SELF HIGHLIGHT (animated ring) ===
  if (p.id === myId) {
    const dashOff = frameCount * 0.8;
    ctx.beginPath(); ctx.arc(s.x, s.y, r + 5, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffd93d';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.lineDashOffset = dashOff;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
  }

  // === ACTIVE EFFECTS VISUAL ===
  if (hasEffect(p.id, 'shield')) {
    ctx.beginPath(); ctx.arc(s.x, s.y, r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,217,61,0.55)';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([4, 3]);
    ctx.lineDashOffset = frameCount * 0.5;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
  }
  if (hasEffect(p.id, 'invisible')) {
    ctx.globalAlpha = 0.35;
  }
  if (hasEffect(p.id, 'frozen')) {
    ctx.fillStyle = 'rgba(0,210,211,0.25)';
    ctx.beginPath(); ctx.arc(s.x, s.y, r + 6, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#00d2d3';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(s.x, s.y, r + 6, 0, Math.PI * 2); ctx.stroke();
  }
  if (hasEffect(p.id, 'speed') && (p.dir.x !== 0 || p.dir.y !== 0)) {
    spawnParticle(p.x + (Math.random()-.5)*6, p.y + (Math.random()-.5)*6,
      'rgba(77,150,255,', 250, -p.dir.x*1.5, -p.dir.y*1.5, 2);
  }
}

// ============ MINIMAP ============
function renderMinimap() {
  const mc = document.getElementById('minimap');
  if (!mc) return;
  const mctx = mc.getContext('2d');
  mc.width = 120; mc.height = 90;
  const mw = mc.width, mh = mc.height;
  const sx = mw / ARENA_W, sy = mh / ARENA_H;

  mctx.clearRect(0, 0, mw, mh);
  mctx.fillStyle = 'rgba(13,17,23,0.9)';
  mctx.fillRect(0, 0, mw, mh);

  // Walls
  mctx.fillStyle = 'rgba(60,68,80,0.6)';
  WALLS.forEach(w => {
    mctx.fillRect(w.x * sx, w.y * sy, Math.max(2, w.w * sx), Math.max(2, w.h * sy));
  });

  // Items
  mapItems.forEach(item => {
    mctx.fillStyle = item.type.color;
    mctx.beginPath();
    mctx.arc(item.x * sx, item.y * sy, 2.5, 0, Math.PI * 2);
    mctx.fill();
  });

  // Players
  const ids = Object.keys(players);
  ids.forEach(id => {
    const p = players[id];
    if (!p.alive) return;
    const px = p.x * sx, py = p.y * sy;
    const pr = p.isGhost ? 3.5 : 3;
    if (p.isGhost) {
      mctx.fillStyle = '#ff4444';
    } else if (id === myId) {
      mctx.fillStyle = '#ffd93d';
    } else {
      mctx.fillStyle = COLORS[p.color] || '#4d96ff';
    }
    mctx.beginPath(); mctx.arc(px, py, pr, 0, Math.PI * 2); mctx.fill();
    if (id === myId) {
      mctx.strokeStyle = '#ffd93d';
      mctx.lineWidth = 1;
      mctx.stroke();
    }
  });
}

function lightenColor(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (num >> 16) + pct);
  const g = Math.min(255, ((num >> 8) & 0xff) + pct);
  const b = Math.min(255, (num & 0xff) + pct);
  return `rgb(${r},${g},${b})`;
}

// ============ WALL COLLISION ============
function collidesWall(x, y, r) {
  for (const w of WALLS) {
    const cx = Math.max(w.x, Math.min(x, w.x + w.w));
    const cy = Math.max(w.y, Math.min(y, w.y + w.h));
    if (Math.hypot(x - cx, y - cy) < r) return true;
  }
  return false;
}

// ============ AMBIENT PARTICLES (fireflies) ============
const ambientPx = [];
for (let i = 0; i < 25; i++) {
  ambientPx.push({
    x: Math.random() * ARENA_W, y: Math.random() * ARENA_H,
    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
    size: 1 + Math.random() * 2, phase: Math.random() * Math.PI * 2,
    hue: Math.random() > 0.5 ? '100,200,80' : '80,180,220'
  });
}
let floorCanvas = null;

// ============ DRAW FLOOR (pre-rendered stone tiles) ============
function drawFloor() {
  if (!floorCanvas || floorCanvas.width !== Math.ceil(ARENA_W) || floorCanvas.height !== Math.ceil(ARENA_H)) {
    floorCanvas = document.createElement('canvas');
    floorCanvas.width = ARENA_W; floorCanvas.height = ARENA_H;
    const fc = floorCanvas.getContext('2d');
    fc.fillStyle = '#12161e';
    fc.fillRect(0, 0, ARENA_W, ARENA_H);
    const ts = 50;
    for (let tx = 0; tx < ARENA_W; tx += ts) {
      for (let ty = 0; ty < ARENA_H; ty += ts) {
        const idx = Math.floor(tx / ts) * 7 + Math.floor(ty / ts) * 13;
        const v = ((idx * 37) % 13) - 6;
        const r = 18 + v, g = 22 + v, b = 30 + v;
        fc.fillStyle = `rgb(${r},${g},${b})`;
        fc.fillRect(tx + 1, ty + 1, ts - 2, ts - 2);
        const hv = ((idx * 53) % 9);
        if (hv < 2) {
          fc.fillStyle = `rgba(50,80,50,${0.04 + hv * 0.02})`;
          fc.fillRect(tx + 5 + hv * 8, ty + 10, 12 + hv * 5, 7);
        }
      }
    }
    fc.strokeStyle = 'rgba(255,255,255,0.018)';
    fc.lineWidth = 1;
    for (let x = 0; x <= ARENA_W; x += ts) { fc.beginPath(); fc.moveTo(x, 0); fc.lineTo(x, ARENA_H); fc.stroke(); }
    for (let y = 0; y <= ARENA_H; y += ts) { fc.beginPath(); fc.moveTo(0, y); fc.lineTo(ARENA_W, y); fc.stroke(); }
  }
  ctx.drawImage(floorCanvas, tl.x, tl.y, aw, ah);
}

// ============ HUD ============
function updateHUD() {
  const timer = document.getElementById('hud-timer');
  if (isSinglePlayer) {
    const mins = Math.floor(gameTime / 60);
    const secs = Math.ceil(gameTime % 60);
    timer.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
    timer.className = 'hud-timer' + (gameTime <= 30 ? ' urgent' : '');
  } else {
    timer.textContent = Math.ceil(gameTime);
    timer.className = 'hud-timer' + (gameTime <= 15 ? ' urgent' : '');
  }

  const me = players[myId];
  const role = document.getElementById('hud-role');
  if (me && me.isGhost) {
    role.textContent = '👻 鬼';
    role.className = 'hud-role ghost';
  } else {
    role.textContent = '🏃 人类';
    role.className = 'hud-role runner';
  }

  const ghostCount = Object.values(players).filter(p => p.isGhost).length;
  const runnerCount = Object.values(players).filter(p => !p.isGhost).length;
  document.getElementById('hud-players').textContent = `👻 ${ghostCount} | 🏃 ${runnerCount}`;
}

// ============ INPUT: KEYBOARD ============
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    activateDash({preventDefault:()=>{}, stopPropagation:()=>{}});
    return;
  }
  const dirs = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
    w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
  if (dirs[e.key]) {
    e.preventDefault();
    myDir = dirs[e.key];
    if (isHost && players[myId]) players[myId].dir = myDir;
    sendInput(myDir);
  }
});
document.addEventListener('keyup', e => {
  if (!gameRunning) return;
  const dirs = {ArrowUp:1,ArrowDown:1,ArrowLeft:1,ArrowRight:1,w:1,s:1,a:1,d:1,W:1,S:1,A:1,D:1};
  if (dirs[e.key]) {
    myDir = {x:0, y:0};
    if (isHost && players[myId]) players[myId].dir = myDir;
    sendInput(myDir);
  }
});

// ============ INPUT: JOYSTICK ============
const jZone = document.getElementById('joystick-zone');
const jKnob = document.getElementById('joystick-knob');
const jBase = document.getElementById('joystick-base');

jZone.addEventListener('touchstart', e => {
  e.preventDefault();
  joystickActive = true;
  const rect = jBase.getBoundingClientRect();
  joystickCenter = {x: rect.left + rect.width/2, y: rect.top + rect.height/2};
}, {passive:false});

document.addEventListener('touchmove', e => {
  if (!joystickActive) return;
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - joystickCenter.x;
  const dy = t.clientY - joystickCenter.y;
  const dist = Math.hypot(dx, dy);
  const maxDist = 45;
  const clampDist = Math.min(dist, maxDist);
  const angle = Math.atan2(dy, dx);
  const nx = Math.cos(angle) * clampDist;
  const ny = Math.sin(angle) * clampDist;
  jKnob.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
  if (dist > 8) {
    myDir = {x: Math.cos(angle), y: Math.sin(angle)};
  } else {
    myDir = {x:0, y:0};
  }
  if (isHost && players[myId]) players[myId].dir = myDir;
  sendInput(myDir);
}, {passive:false});

document.addEventListener('touchend', e => {
  if (!joystickActive) return;
  joystickActive = false;
  jKnob.style.transform = 'translate(-50%, -50%)';
  myDir = {x:0, y:0};
  if (isHost && players[myId]) players[myId].dir = myDir;
  sendInput(myDir);
});

// Mouse joystick support for desktop testing
jZone.addEventListener('mousedown', e => {
  e.preventDefault();
  joystickActive = true;
  const rect = jBase.getBoundingClientRect();
  joystickCenter = {x: rect.left + rect.width/2, y: rect.top + rect.height/2};
});
document.addEventListener('mousemove', e => {
  if (!joystickActive) return;
  const dx = e.clientX - joystickCenter.x;
  const dy = e.clientY - joystickCenter.y;
  const dist = Math.hypot(dx, dy);
  const maxDist = 45;
  const clampDist = Math.min(dist, maxDist);
  const angle = Math.atan2(dy, dx);
  const nx = Math.cos(angle) * clampDist;
  const ny = Math.sin(angle) * clampDist;
  jKnob.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
  if (dist > 8) {
    myDir = {x: Math.cos(angle), y: Math.sin(angle)};
  } else {
    myDir = {x:0, y:0};
  }
  if (isHost && players[myId]) players[myId].dir = myDir;
  sendInput(myDir);
});
document.addEventListener('mouseup', () => {
  if (!joystickActive) return;
  joystickActive = false;
  jKnob.style.transform = 'translate(-50%, -50%)';
  myDir = {x:0, y:0};
  if (isHost && players[myId]) players[myId].dir = myDir;
  sendInput(myDir);
});

// ============ NETWORK: SEND INPUT ============
let lastInputSend = 0;
function sendInput(dir) {
  const now = Date.now();
  if (now - lastInputSend < 50) return; // throttle
  lastInputSend = now;
  if (!isHost && connections.length > 0) {
    connections[0].send({type:'input', dir});
  }
}

// ============ INIT: Check for invite link ============
if (!checkUrlParams()) {
  // Normal page load, show main screen
}

// ============ PWA ============
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Prevent default touch behavior
document.addEventListener('touchstart', e => {
  if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') e.preventDefault();
}, {passive:false});
